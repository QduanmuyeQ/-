<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <title>我的博客</title>
    <link rel="stylesheet" href="../../css/home.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        body {
            overflow-y: auto;
            height: auto;
            min-height: 100vh;
        }
        .blog-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            padding-bottom: 60px;
            color: white;
            font-family: 'Microsoft YaHei', 微软雅黑, sans-serif;
        }
        .blog-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .blog-header h1 {
            color: #88DCDC;
            font-size: 36px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .blog-header p {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
        }
        .add-btn {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(136, 220, 220, 0.3);
            border: 2px solid #88DCDC;
            border-radius: 25px;
            color: #88DCDC;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        .add-btn:hover {
            background: rgba(136, 220, 220, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(136, 220, 220, 0.3);
        }
        .add-form {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            display: none;
        }
        .add-form.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #88DCDC;
            font-weight: bold;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.15);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 0 15px rgba(136, 220, 220, 0.3);
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .submit-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #88DCDC, #5cb8b8);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(136, 220, 220, 0.4);
        }
        .blog-list {
            list-style: none;
            padding: 0;
        }
        .blog-item {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
        }
        .blog-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .blog-item.hidden {
            display: none;
        }
        .blog-title {
            color: #FFA500;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .blog-title:hover {
            color: #ffc857;
        }
        .blog-meta {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-bottom: 18px;
            display: flex;
            gap: 20px;
        }
        .blog-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .blog-preview {
            color: rgba(255,255,255,0.85);
            line-height: 1.7;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .blog-full {
            color: rgba(255,255,255,0.85);
            line-height: 1.8;
            margin-bottom: 15px;
            white-space: pre-wrap;
            display: none;
        }
        .blog-full.show {
            display: block;
        }
        .blog-actions {
            display: flex;
            gap: 15px;
        }
        .action-btn {
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        .action-btn.read {
            background: rgba(136, 220, 220, 0.3);
            color: #88DCDC;
        }
        .action-btn.read:hover {
            background: rgba(136, 220, 220, 0.5);
        }
        .action-btn.edit {
            background: rgba(255, 215, 0, 0.3);
            color: #FFD700;
        }
        .action-btn.edit:hover {
            background: rgba(255, 215, 0, 0.5);
        }
        .action-btn.delete {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
        }
        .action-btn.delete:hover {
            background: rgba(255, 100, 100, 0.5);
        }
        .private-lock {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }
        .lock-icon {
            font-size: 64px;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }
        .lock-text {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            margin-bottom: 20px;
        }
        .unlock-btn {
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            background: rgba(136, 220, 220, 0.3);
            color: #88DCDC;
            border: none;
            transition: all 0.3s ease;
        }
        .unlock-btn:hover {
            background: rgba(136, 220, 220, 0.5);
            transform: scale(1.05);
        }
        .forgot-password {
            text-align: center;
            color: rgba(136, 220, 220, 0.8);
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }
        .forgot-password:hover {
            color: #88DCDC;
            text-decoration: underline;
        }
        .no-blog {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        .no-blog i {
            font-size: 64px;
            margin-bottom: 20px;
            display: block;
        }
        .tag {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 165, 0, 0.2);
            color: #FFA500;
            border-radius: 15px;
            font-size: 13px;
            margin-right: 10px;
            margin-bottom: 15px;
        }
        .upload-area {
            border: 2px dashed rgba(136, 220, 220, 0.4);
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
        }
        .upload-area:hover {
            border-color: rgba(136, 220, 220, 0.8);
            background: rgba(136, 220, 220, 0.1);
        }
        .upload-area.dragover {
            border-color: #88DCDC;
            background: rgba(136, 220, 220, 0.15);
        }
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }
        .upload-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }
        .upload-hint {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            margin-top: 5px;
        }
        .preview-images {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(136, 220, 220, 0.3);
        }
        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-delete {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 24px;
            height: 24px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .preview-delete:hover {
            background: rgba(255, 100, 100, 0.9);
        }
        .blog-images {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        .color-picker {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .color-picker input[type="color"],
        .color-picker-small input[type="color"] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: transparent;
        }
        .color-picker input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-picker input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .color-presets {
            display: flex;
            gap: 8px;
        }
        .color-preset {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .color-preset:hover {
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.8);
        }
        .blog-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            object-fit: contain;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: zoom-in;
            transition: all 0.3s ease;
        }
        .blog-image:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        .image-viewer.show {
            display: flex;
        }
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .viewer-title {
            color: #FFA500;
            font-size: 18px;
            font-weight: bold;
        }
        .viewer-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .viewer-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .viewer-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .viewer-btn.zoom:hover {
            background: rgba(136, 220, 220, 0.3);
            color: #88DCDC;
        }
        .viewer-btn.close:hover {
            background: rgba(255, 100, 100, 0.3);
            color: #ff6464;
        }
        .viewer-zoom-info {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }
        .viewer-image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }
        .viewer-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: transform 0.3s ease;
            transform-origin: center center;
        }
        .viewer-content {
            padding: 25px 30px;
            background: rgba(30, 30, 30, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 200px;
            overflow-y: auto;
        }
        .viewer-content-title {
            color: #88DCDC;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .viewer-content-text {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .viewer-content-empty {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            font-style: italic;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: rgba(30, 30, 30, 0.9);
            border-radius: 20px;
            padding: 45px 45px;
            min-width: 360px;
            max-width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            animation: modalScale 0.3s ease forwards;
        }
        @keyframes modalScale {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-icon {
            font-size: 52px;
            margin-bottom: 25px;
        }
        .modal-title {
            font-size: 22px;
            color: white;
            font-weight: bold;
            margin-bottom: 18px;
        }
        .modal-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .modal-warning {
            font-size: 14px;
            color: #ff6b6b;
            margin-top: 15px;
            margin-bottom: 28px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 107, 107, 0.3);
        }
        .modal-btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            min-width: 100px;
        }
        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }
        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .modal-btn.confirm {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        .modal-btn.confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        .modal-btn.confirm.second {
            background: linear-gradient(135deg, #ff4757, #c0392b);
        }
        .modal-btn.confirm.second:hover {
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.5);
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(136, 220, 220, 0.4);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(136, 220, 220, 0.6);
        }
        @keyframes checkmark-pop {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }
        .blog-header h1 { overflow: hidden; display: inline-block; }
        .blog-header h1 .title-inner { display: inline-block; }
        .blog-post { opacity: 0; transform: translateY(50px); }
    </style>
</head>
<body>
    <div class="blog-content">
        <div class="blog-header">
            <h1 class="page-title"><span class="title-inner">� 我的博客</span></h1>
            <p>记录生活点滴，分享所思所想</p>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button class="add-btn" onclick="toggleAddForm()">✏️ 写一篇新博客</button>
            <button class="add-btn" onclick="exportBlogs()" style="background: rgba(255, 215, 0, 0.3); color: #FFD700;">📤 导出数据</button>
            <button class="add-btn" onclick="document.getElementById('importFile').click()" style="background: rgba(152, 251, 152, 0.3); color: #98FB98;">📥 导入数据</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBlogs(event)">
        </div>

        <div class="add-form" id="addForm">
            <h2 style="color: #88DCDC; margin-bottom: 20px;">新博客</h2>
            <div class="form-group">
                <label>标题</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="blogTitle" placeholder="请输入博客标题" style="flex: 1;">
                    <div class="color-picker-small">
                        <input type="color" id="blogTitleColor" value="#88DCDC" title="标题颜色">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>标签</label>
                <input type="text" id="blogTags" placeholder="多个标签用逗号分隔">
            </div>
            <div class="form-group">
                <label>发布时间</label>
                <input type="datetime-local" id="blogDateTime" placeholder="选择发布时间">
                <span style="font-size: 12px; color: rgba(255, 255, 255, 0.5); display: block; margin-top: 5px;">默认使用当前时间，可修改为过去时间补全历史</span>
            </div>
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="blogPrivate" style="width: 18px; height: 18px; cursor: pointer;">
                    🔒 设置为私密博客
                </label>
                <div id="passwordInput" style="display: none; margin-top: 10px;">
                    <input type="text" id="blogPassword" placeholder="输入密码（默认：114514）" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 14px;">
                </div>
            </div>
            <div class="form-group">
                <label>封面图片</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <span class="upload-icon">📷</span>
                    <span class="upload-text">点击或拖拽上传图片</span>
                    <span class="upload-hint">支持任意图片格式和大小</span>
                </div>
                <input type="file" id="fileInput" accept="image/*" multiple style="display: none;" onchange="handleFileSelect(event)">
                <div class="preview-images" id="previewImages"></div>
            </div>
            <div class="form-group">
                <label>内容</label>
                <textarea id="blogContent" placeholder="写下你的想法..."></textarea>
            </div>
            <div class="form-group">
                <label>文字颜色</label>
                <div class="color-picker">
                    <input type="color" id="blogColor" value="#ffffff" title="选择文字颜色">
                    <div class="color-presets">
                        <button class="color-preset" style="background: #ffffff" onclick="setBlogColor('#ffffff')" title="白色"></button>
                        <button class="color-preset" style="background: #88DCDC" onclick="setBlogColor('#88DCDC')" title="青色"></button>
                        <button class="color-preset" style="background: #FFA500" onclick="setBlogColor('#FFA500')" title="橙色"></button>
                        <button class="color-preset" style="background: #FFD700" onclick="setBlogColor('#FFD700')" title="金色"></button>
                        <button class="color-preset" style="background: #98FB98" onclick="setBlogColor('#98FB98')" title="浅绿色"></button>
                        <button class="color-preset" style="background: #FFB6C1" onclick="setBlogColor('#FFB6C1')" title="粉色"></button>
                        <button class="color-preset" style="background: #DDA0DD" onclick="setBlogColor('#DDA0DD')" title="紫色"></button>
                        <button class="color-preset" style="background: #F0E68C" onclick="setBlogColor('#F0E68C')" title="卡其色"></button>
                    </div>
                </div>
            </div>
            <button class="submit-btn" onclick="addBlog()">发布博客</button>
        </div>

        <ul class="blog-list" id="blogList">
        </ul>

        <div class="no-blog" id="noBlog">
            <i>📚</i>
            <p>还没有博客，快来写第一篇吧！</p>
        </div>
    </div>

    <div class="modal-overlay" id="passwordModal" style="display: none;">
        <div class="modal-box" style="width: 380px; min-height: 360px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <div class="modal-icon" id="passwordModalIcon">🔒</div>
            <div class="modal-title" id="passwordModalTitle">输入密码</div>
            <div class="modal-text" id="passwordModalText">请输入密码解锁私密博客</div>
            
            <div id="passwordInputContainer">
                <input type="password" id="passwordInputField" placeholder="输入密码" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; font-size: 16px; margin: 15px 0; box-sizing: border-box;">

            </div>
            
            <div class="modal-btn-group">
                <button class="modal-btn cancel" id="cancelBtn" onclick="closePasswordModal()">取消</button>
                <button class="modal-btn confirm" id="confirmBtn" onclick="verifyPassword()">确认</button>

        </div>
    </div>

    <div class="image-viewer" id="imageViewer">
        <div class="viewer-header">
            <div class="viewer-title" id="viewerTitle">图片查看器</div>

            <div class="modal-icon" id="modalIcon">⚠️</div>

            <div class="modal-text" id="modalText">确定要删除这篇博客吗？</div>

            <div class="modal-btn-group">
                <button class="modal-btn cancel" onclick="closeModal()">取消</button>
                <button class="modal-btn confirm" id="modalConfirmBtn" onclick="handleModalConfirm()">确认删除</button>
            </div>
        </div>

    <script>
        var db;
        var DB_NAME = 'BlogDB';
        var DB_VERSION = 1;
        var STORE_NAME = 'blogs';

        function initDB() {
            return new Promise(function(resolve, reject) {
                var request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = function() { reject(request.error); };
                request.onsuccess = function() {
                    db = request.result;
                    resolve(db);
                };
                request.onupgradeneeded = function(e) {
                    var database = e.target.result;
                    if (!database.objectStoreNames.contains(STORE_NAME)) {
                        database.createObjectStore(STORE_NAME);
                    }
                };
            });
        }

        function getBlogs() {
            return new Promise(function(resolve) {
                if (!db) {
                    initDB().then(function() {
                        getBlogs().then(resolve);
                    }).catch(function() {
                        resolve([]);
                    });
                    return;
                }
                var transaction = db.transaction([STORE_NAME], 'readonly');
                var store = transaction.objectStore(STORE_NAME);
                var request = store.get('blogs');
                request.onsuccess = function() {
                    resolve(request.result ? JSON.parse(request.result) : []);
                };
                request.onerror = function() {
                    resolve([]);
                };
            });
        }

        function compressImage(base64Str, maxWidth = 1024, maxHeight = 1024, quality = 0.8) {
            return new Promise(function(resolve) {
                var img = new Image();
                img.src = base64Str;
                img.onload = function() {
                    var width = img.width;
                    var height = img.height;

                    if (width > maxWidth || height > maxHeight) {
                        if (width > height) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        } else {
                            width = (width * maxHeight) / height;
                            height = maxHeight;
                        }
                    }

                    var canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = function() {
                    resolve(base64Str);
                };
            });
        }

        function saveBlogs(blogs) {
            return new Promise(function(resolve, reject) {
                if (!db) {
                    initDB().then(function() {
                        saveBlogs(blogs).then(resolve).catch(reject);
                    }).catch(reject);
                    return;
                }
                var transaction = db.transaction([STORE_NAME], 'readwrite');
                var store = transaction.objectStore(STORE_NAME);
                var request = store.put(JSON.stringify(blogs), 'blogs');
                request.onsuccess = function() { resolve(); };
                request.onerror = function() { reject(request.error); };
            });
        }

        function formatDate(timestamp) {
            var date = new Date(timestamp);
            var year = date.getFullYear();
            var month = String(date.getMonth() + 1).padStart(2, '0');
            var day = String(date.getDate()).padStart(2, '0');
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            return year + '-' + month + '-' + day + ' ' + hours + ':' + minutes;
        }

        function renderBlogs() {
            getBlogs().then(function(blogs) {
                window.blogData = blogs;
                var blogList = document.getElementById('blogList');
                var noBlog = document.getElementById('noBlog');

                blogList.innerHTML = '';

                if (blogs.length === 0) {
                    noBlog.style.display = 'block';
                    return;
                }

            noBlog.style.display = 'none';

            blogs.sort(function(a, b) {
                return b.timestamp - a.timestamp;
            });

            blogs.forEach(function(blog) {
                var item = document.createElement('li');
                item.className = 'blog-item';
                item.id = 'blog-' + blog.id;

                var tagsHtml = '';
                if (blog.tags) {
                    blog.tags.split(',').forEach(function(tag) {
                        tag = tag.trim();
                        if (tag) {
                            tagsHtml += '<span class="tag">' + tag + '</span>';
                        }
                    });
                }

                var imagesHtml = '';
                if (blog.images && blog.images.length > 0) {
                    imagesHtml = '<div class="blog-images">';
                    blog.images.forEach(function(imgSrc, index) {
                        imagesHtml += `<img src="${imgSrc}" class="blog-image" alt="博客图片" onclick="openImageViewer('${blog.id}', ${index})">`;
                    });
                    imagesHtml += '</div>';
                }

                var color = blog.color || '#ffffff';
                var titleColor = blog.titleColor || '#88DCDC';

                if (blog.isPrivate && !unlockedBlogs.has(blog.id)) {
                    item.innerHTML = `
                        <div class="private-lock">
                            <div class="lock-icon">🔒</div>
                            <div class="lock-text">私密博客</div>
                            <button class="unlock-btn" onclick="showPasswordModal('${blog.id}')">点击解锁</button>
                        </div>`;
                } else {
                    item.innerHTML = `
                        <h3 class="blog-title" onclick="toggleBlogContent('${blog.id}')" style="color: ${titleColor}">${blog.title}</h3>
                        <div class="blog-meta">
                            <span>📅 ${formatDate(blog.timestamp)}</span>
                            ${blog.images && blog.images.length > 0 ? '<span>🖼️ ' + blog.images.length + '张图片</span>' : ''}
                        </div>
                        ${tagsHtml}
                        ${imagesHtml}
                        <p class="blog-preview" style="color: ${color}">${blog.content}</p>
                        <p class="blog-full" id="full-${blog.id}" style="color: ${color}">${blog.content}</p>
                        <div class="blog-actions">
                            <button class="action-btn read" onclick="toggleBlogContent('${blog.id}')">
                                ${blog.expanded ? '收起' : '阅读全文'}
                            </button>
                            <button class="action-btn edit" onclick="editBlog('${blog.id}')">编辑</button>
                            <button class="action-btn delete" onclick="deleteBlog('${blog.id}')">删除</button>
                        </div>
                    `;

                    if (blog.expanded) {
                        item.querySelector('.blog-preview').style.display = 'none';
                        item.querySelector('.blog-full').classList.add('show');
                    }
                }

                blogList.appendChild(item);
            });
            });
        }

        function toggleAddForm() {
            var form = document.getElementById('addForm');
            form.classList.toggle('show');
            if (form.classList.contains('show') && !editingBlogId) {
                var now = new Date();
                var year = now.getFullYear();
                var month = String(now.getMonth() + 1).padStart(2, '0');
                var day = String(now.getDate()).padStart(2, '0');
                var hours = String(now.getHours()).padStart(2, '0');
                var minutes = String(now.getMinutes()).padStart(2, '0');
                document.getElementById('blogDateTime').value = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
            }
            if (!form.classList.contains('show')) {
                uploadedImages = [];
                editingBlogId = null;
                document.getElementById('previewImages').innerHTML = '';
                document.getElementById('fileInput').value = '';
                document.getElementById('blogTitle').value = '';
                document.getElementById('blogTags').value = '';
                document.getElementById('blogDateTime').value = '';
                document.getElementById('blogContent').value = '';
                document.getElementById('blogColor').value = '#ffffff';
                document.getElementById('blogTitleColor').value = '#88DCDC';
                document.getElementById('blogPrivate').checked = false;
                document.getElementById('blogPassword').value = '';
                document.getElementById('passwordInput').style.display = 'none';
                form.querySelector('h2').textContent = '新博客';
                form.querySelector('.submit-btn').textContent = '发布博客';
                form.querySelector('.submit-btn').onclick = addBlog;
            }
        }

        function setBlogColor(color) {
            document.getElementById('blogColor').value = color;
        }

        function handleFileSelect(event) {
            var files = event.target.files;
            if (!files || files.length === 0) return;

            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                var reader = new FileReader();
                reader.onload = function(e) {
                    compressImage(e.target.result).then(function(compressed) {
                        uploadedImages.push(compressed);
                        renderPreview();
                    });
                };
                reader.readAsDataURL(file);
            }
        }

        function renderPreview() {
            var preview = document.getElementById('previewImages');
            preview.innerHTML = '';

            uploadedImages.forEach(function(src, index) {
                var item = document.createElement('div');
                item.className = 'preview-item';
                item.innerHTML = `
                    <img src="${src}" alt="预览">
                    <span class="preview-delete" onclick="removeImage(${index})">×</span>
                `;
                preview.appendChild(item);
            });
        }

        function removeImage(index) {
            uploadedImages.splice(index, 1);
            renderPreview();
        }

        var unlockingBlogId = null;
        var unlockedBlogs = new Set();

        function showPasswordModal(blogId) {
            unlockingBlogId = blogId;
            document.getElementById('passwordInputField').value = '';
            document.getElementById('passwordModal').style.display = 'flex';
            
            document.getElementById('passwordModalIcon').textContent = '🔒';
            document.getElementById('passwordModalIcon').style.animation = '';
            document.getElementById('passwordModalTitle').textContent = '输入密码';
            document.getElementById('passwordModalText').textContent = '请输入密码解锁私密博客';
            document.getElementById('passwordInputContainer').style.display = 'block';
            document.getElementById('cancelBtn').style.display = '';
            document.getElementById('confirmBtn').style.display = '';
            document.getElementById('confirmBtn').textContent = '确认';
            document.getElementById('confirmBtn').onclick = verifyPassword;
            
            setTimeout(function() {
                document.getElementById('passwordInputField').focus();
            }, 100);
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            unlockingBlogId = null;
        }

        function showForgotPassword() {
            document.getElementById('passwordModalIcon').textContent = '😜';
            document.getElementById('passwordModalTitle').textContent = '骗你的';
            document.getElementById('passwordModalText').textContent = '忘了我也没招';
            document.getElementById('passwordInputContainer').style.display = 'none';
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('confirmBtn').style.display = '';
            document.getElementById('confirmBtn').textContent = '再想想';
            document.getElementById('confirmBtn').onclick = hideForgotPassword;
        }

        function hideForgotPassword() {
            document.getElementById('passwordModalIcon').textContent = '🔒';
            document.getElementById('passwordModalIcon').style.animation = '';
            document.getElementById('passwordModalTitle').textContent = '输入密码';
            document.getElementById('passwordModalText').textContent = '请输入密码解锁私密博客';
            document.getElementById('passwordInputContainer').style.display = 'block';
            document.getElementById('cancelBtn').style.display = '';
            document.getElementById('confirmBtn').style.display = '';
            document.getElementById('confirmBtn').textContent = '确认';
            document.getElementById('confirmBtn').onclick = verifyPassword;
            
            setTimeout(function() {
                document.getElementById('passwordInputField').focus();
            }, 50);
        }

        async function verifyPassword() {
            var password = document.getElementById('passwordInputField').value;
            var blogs = await getBlogs();
            var blog = blogs.find(function(b) { return b.id === unlockingBlogId; });

            if (!blog) {
                closePasswordModal();
                return;
            }

            var correctPassword = blog.password || '114514';
            if (password === correctPassword) {
                unlockedBlogs.add(unlockingBlogId);
                
                document.getElementById('passwordModalIcon').textContent = '✅';
                document.getElementById('passwordModalIcon').style.animation = 'checkmark-pop 0.5s ease-out';
                document.getElementById('passwordModalTitle').textContent = '解锁成功';
                document.getElementById('passwordModalText').textContent = '正在打开博客...';
                document.getElementById('passwordInputContainer').style.display = 'none';
                document.getElementById('cancelBtn').style.display = 'none';
                document.getElementById('confirmBtn').style.display = 'none';
                
                setTimeout(function() {
                    closePasswordModal();
                    renderBlogs();
                }, 1200);
            } else {
                alert('密码错误！请重试');
                document.getElementById('passwordInputField').value = '';
                document.getElementById('passwordInputField').focus();
            }
        }

        document.getElementById('passwordInputField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyPassword();
            }
        });

        document.getElementById('blogPrivate').addEventListener('change', function() {
            var passwordDiv = document.getElementById('passwordInput');
            passwordDiv.style.display = this.checked ? 'block' : 'none';
        });

        async function addBlog() {
            var title = document.getElementById('blogTitle').value.trim();
            var tags = document.getElementById('blogTags').value.trim();
            var content = document.getElementById('blogContent').value.trim();

            if (!title) {
                alert('请输入博客标题');
                return;
            }
            if (!content && uploadedImages.length === 0) {
                alert('请输入博客内容或上传图片');
                return;
            }

            var dateTimeInput = document.getElementById('blogDateTime').value;
            var timestamp = dateTimeInput ? new Date(dateTimeInput).getTime() : Date.now();
            var color = document.getElementById('blogColor').value;
            var titleColor = document.getElementById('blogTitleColor').value;
            var isPrivate = document.getElementById('blogPrivate').checked;
            var password = isPrivate ? (document.getElementById('blogPassword').value || '114514') : '';

            var blogs = await getBlogs();
            var newBlog = {
                id: Date.now().toString(),
                title: title,
                titleColor: titleColor,
                tags: tags,
                content: content,
                images: uploadedImages.slice(),
                timestamp: timestamp,
                color: color,
                isPrivate: isPrivate,
                password: password,
                expanded: false
            };

            blogs.push(newBlog);
            await saveBlogs(blogs);

            document.getElementById('blogTitle').value = '';
            document.getElementById('blogTags').value = '';
            document.getElementById('blogDateTime').value = '';
            document.getElementById('blogContent').value = '';
            document.getElementById('blogColor').value = '#ffffff';
            document.getElementById('blogTitleColor').value = '#88DCDC';
            document.getElementById('blogPrivate').checked = false;
            document.getElementById('blogPassword').value = '';
            document.getElementById('passwordInput').style.display = 'none';
            uploadedImages = [];
            document.getElementById('previewImages').innerHTML = '';
            document.getElementById('fileInput').value = '';

            toggleAddForm();
            renderBlogs();
        }

        async function toggleBlogContent(id) {
            var blogs = await getBlogs();
            var blog = blogs.find(function(b) { return b.id === id; });
            if (blog) {
                blog.expanded = !blog.expanded;
                await saveBlogs(blogs);
                renderBlogs();
            }
        }

        var editingBlogId = null;

        async function editBlog(id) {
            var blogs = await getBlogs();
            var blog = blogs.find(function(b) { return b.id === id; });
            if (!blog) return;

            editingBlogId = id;
            document.getElementById('blogTitle').value = blog.title;
            document.getElementById('blogTags').value = blog.tags || '';
            document.getElementById('blogContent').value = blog.content;
            document.getElementById('blogColor').value = blog.color || '#ffffff';
            document.getElementById('blogTitleColor').value = blog.titleColor || '#88DCDC';
            document.getElementById('blogPrivate').checked = blog.isPrivate || false;
            document.getElementById('blogPassword').value = blog.password || '';
            document.getElementById('passwordInput').style.display = blog.isPrivate ? 'block' : 'none';

            if (blog.timestamp) {
                var date = new Date(blog.timestamp);
                var year = date.getFullYear();
                var month = String(date.getMonth() + 1).padStart(2, '0');
                var day = String(date.getDate()).padStart(2, '0');
                var hours = String(date.getHours()).padStart(2, '0');
                var minutes = String(date.getMinutes()).padStart(2, '0');
                var dateStr = year + '-' + month + '-' + day + 'T' + hours + ':' + minutes;
                document.getElementById('blogDateTime').value = dateStr;
            }

            uploadedImages = blog.images ? blog.images.slice() : [];
            renderPreview();

            var form = document.getElementById('addForm');
            form.classList.add('show');
            form.querySelector('h2').textContent = '编辑博客';
            form.querySelector('.submit-btn').textContent = '保存修改';
            form.querySelector('.submit-btn').onclick = updateBlog;

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateBlog() {
            if (!editingBlogId) return;

            var title = document.getElementById('blogTitle').value.trim();
            var tags = document.getElementById('blogTags').value.trim();
            var content = document.getElementById('blogContent').value.trim();
            var dateTimeInput = document.getElementById('blogDateTime').value;
            var timestamp = dateTimeInput ? new Date(dateTimeInput).getTime() : Date.now();
            var color = document.getElementById('blogColor').value;
            var titleColor = document.getElementById('blogTitleColor').value;
            var isPrivate = document.getElementById('blogPrivate').checked;
            var password = isPrivate ? (document.getElementById('blogPassword').value || '114514') : '';

            if (!title) {
                alert('请输入博客标题');
                return;
            }
            if (!content && uploadedImages.length === 0) {
                alert('请输入博客内容或上传图片');
                return;
            }

            var blogs = await getBlogs();
            var blogIndex = blogs.findIndex(function(b) { return b.id === editingBlogId; });
            if (blogIndex !== -1) {
                blogs[blogIndex] = {
                    id: editingBlogId,
                    title: title,
                    titleColor: titleColor,
                    tags: tags,
                    content: content,
                    images: uploadedImages.slice(),
                    timestamp: timestamp,
                    color: color,
                    isPrivate: isPrivate,
                    password: password,
                    expanded: false
                };
                await saveBlogs(blogs);
            }

            document.getElementById('blogTitle').value = '';
            document.getElementById('blogTags').value = '';
            document.getElementById('blogDateTime').value = '';
            document.getElementById('blogContent').value = '';
            uploadedImages = [];
            document.getElementById('previewImages').innerHTML = '';
            document.getElementById('fileInput').value = '';
            editingBlogId = null;

            var form = document.getElementById('addForm');
            form.classList.remove('show');
            form.querySelector('h2').textContent = '新博客';
            form.querySelector('.submit-btn').textContent = '发布博客';
            form.querySelector('.submit-btn').onclick = addBlog;

            renderBlogs();
        }

        var uploadedImages = [];
        var deleteTargetId = null;
        var deleteConfirmStep = 0;

        async function exportBlogs() {
            var blogs = await getBlogs();
            var zip = new JSZip();

            zip.file('blog_data.json', JSON.stringify(blogs, null, 2));

            var imagesFolder = zip.folder('images');
            var imageIndex = 1;
            blogs.forEach(function(blog, blogIndex) {
                if (blog.images) {
                    blog.images.forEach(function(imgSrc, imgIndex) {
                        var base64Data = imgSrc.split(',')[1];
                        imagesFolder.file('blog_' + blogIndex + '_image_' + imgIndex + '.jpg', base64Data, { base64: true });
                        imageIndex++;
                    });
                }
            });

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                saveAs(content, 'blog_backup_' + new Date().toISOString().slice(0, 10) + '.zip');
                alert('博客数据导出成功！\n\n导出内容：\n- blog_data.json（包含所有文字、颜色、图片数据）\n- images/（所有图片文件）\n\n迁移时只需导入 blog_data.json 文件即可恢复所有内容。');
            });
        }

        function importBlogs(event) {
            var file = event.target.files[0];
            if (!file) return;

            var reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    var blogs = JSON.parse(e.target.result);
                    if (Array.isArray(blogs)) {
                        await saveBlogs(blogs);
                        renderBlogs();
                        alert('博客数据导入成功！');
                    } else {
                        alert('无效的博客数据格式');
                    }
                } catch (error) {
                    alert('导入失败：' + error.message);
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function deleteBlog(id) {
            deleteTargetId = id;
            deleteConfirmStep = 1;
            showModal('⚠️', '确认删除', '确定要删除这篇博客吗？', '此操作无法撤销', '确认删除');
        }

        function showModal(icon, title, text, warning, btnText) {
            document.getElementById('modalIcon').textContent = icon;
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalWarning').textContent = warning || '';
            document.getElementById('modalWarning').style.display = warning ? 'block' : 'none';
            document.getElementById('modalConfirmBtn').textContent = btnText;
            document.getElementById('confirmModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('confirmModal').classList.remove('show');
            deleteTargetId = null;
            deleteConfirmStep = 0;
        }

        async function handleModalConfirm() {
            if (deleteConfirmStep === 1) {
                deleteConfirmStep = 2;
                showModal('🔴', '再次确认', '删除后无法恢复，确定要继续吗？', '请再次点击确认以完成删除', '确定删除');
                document.getElementById('modalConfirmBtn').classList.add('second');
            } else if (deleteConfirmStep === 2) {
                var blogs = await getBlogs();
                blogs = blogs.filter(function(b) { return b.id !== deleteTargetId; });
                await saveBlogs(blogs);
                renderBlogs();
                closeModal();
                document.getElementById('modalConfirmBtn').classList.remove('second');
            }
        }

        var currentZoom = 1;
        var translateX = 0;
        var translateY = 0;
        var isDragging = false;
        var wasDragging = false;
        var startX = 0;
        var startY = 0;
        var startTranslateX = 0;
        var startTranslateY = 0;
        var currentImageSrc = '';
        window.blogData = [];

        function openImageViewer(blogId, imageIndex) {
            var blog = window.blogData.find(function(b) { return b.id === blogId; });
            if (!blog || !blog.images || blog.images.length <= imageIndex) return;

            var imgSrc = blog.images[imageIndex];
            currentZoom = 1;
            translateX = 0;
            translateY = 0;
            currentImageSrc = imgSrc;

            document.getElementById('viewerImage').src = imgSrc;
            document.getElementById('viewerTitle').textContent = blog.title;
            document.getElementById('zoomInfo').textContent = '100%';
            updateTransform();

            if (blog.content && blog.content.trim()) {
                document.getElementById('viewerContent').innerHTML = blog.content.trim().replace(/\n/g, '<br>');
            } else {
                document.getElementById('viewerContent').innerHTML = '<span class="viewer-content-empty">暂无内容</span>';
            }

            document.getElementById('imageViewer').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        document.getElementById('imageViewer').addEventListener('click', function(e) {
            if (e.target === this && !wasDragging) {
                closeImageViewer();
            }
            wasDragging = false;
        });

        function closeImageViewer() {
            document.getElementById('imageViewer').classList.remove('show');
            document.body.style.overflow = '';
            isDragging = false;
        }

        function zoomIn() {
            currentZoom = Math.min(currentZoom + 0.25, 5);
            updateTransform();
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.25, 0.25);
            updateTransform();
        }

        function resetZoom() {
            currentZoom = 1;
            translateX = 0;
            translateY = 0;
            updateTransform();
        }

        function updateTransform() {
            document.getElementById('viewerImage').style.transform = 'translate(' + translateX + 'px, ' + translateY + 'px) scale(' + currentZoom + ')';
            document.getElementById('zoomInfo').textContent = Math.round(currentZoom * 100) + '%';
        }

        var viewerImg = document.getElementById('viewerImage');
        viewerImg.addEventListener('mousedown', function(e) {
            if (currentZoom <= 1) return;
            isDragging = true;
            wasDragging = false;
            startX = e.clientX;
            startY = e.clientY;
            startTranslateX = translateX;
            startTranslateY = translateY;
            viewerImg.style.cursor = 'grabbing';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;
            wasDragging = true;
            translateX = startTranslateX + (e.clientX - startX);
            translateY = startTranslateY + (e.clientY - startY);
            updateTransform();
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
            viewerImg.style.cursor = currentZoom > 1 ? 'grab' : 'zoom-in';
        });

        document.getElementById('viewerImageContainer').addEventListener('wheel', function(e) {
            e.preventDefault();
            var delta = e.deltaY > 0 ? -0.15 : 0.15;
            var newZoom = Math.max(0.25, Math.min(currentZoom + delta, 5));
            
            if (newZoom <= 1) {
                currentZoom = 1;
                translateX = 0;
                translateY = 0;
                updateTransform();
                return;
            }

            var containerRect = document.getElementById('viewerImageContainer').getBoundingClientRect();
            
            var mouseX = e.clientX - containerRect.left;
            var mouseY = e.clientY - containerRect.top;
            
            var containerCenterX = containerRect.width / 2;
            var containerCenterY = containerRect.height / 2;
            
            var imageX = (mouseX - containerCenterX - translateX) / currentZoom;
            var imageY = (mouseY - containerCenterY - translateY) / currentZoom;
            
            translateX = mouseX - containerCenterX - imageX * newZoom;
            translateY = mouseY - containerCenterY - imageY * newZoom;
            
            currentZoom = newZoom;
            updateTransform();
        }, { passive: false });

        viewerImg.style.cursor = 'zoom-in';

        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('imageViewer').classList.contains('show')) return;

            if (e.key === 'Escape') {
                closeImageViewer();
            } else if (e.key === '+' || e.key === '=') {
                zoomIn();
            } else if (e.key === '-') {
                zoomOut();
            } else if (e.key === '0') {
                resetZoom();
            }
        });

        window.onload = function() {
            renderBlogs();
        };
    </script>
<script>
window.addEventListener('load', function() {
    if (typeof gsap === 'undefined') return;
    gsap.registerPlugin(ScrollTrigger);
    
    const titleInner = document.querySelector('.blog-header h1 .title-inner');
    const title = document.querySelector('.blog-header h1');
    const posts = document.querySelectorAll('.blog-post');
    
    const tl = gsap.timeline({ delay: 0.3 });
    
    if (titleInner && title) {
        tl.from(titleInner, {
            yPercent: 120,
            duration: 1.2,
            ease: 'power4.out'
        }, 0.2);
        
        tl.from(title, {
            scaleY: 0.7,
            duration: 1,
            ease: 'power3.out'
        }, 0.1);
    }
    
    if (posts.length) {
        gsap.to(posts, {
            y: 0,
            opacity: 1,
            duration: 0.9,
            ease: 'power3.out',
            stagger: 0.15,
            scrollTrigger: {
                trigger: '.blog-content',
                start: 'top 75%',
                toggleActions: 'play none none reverse'
            }
        });
    }
});
</script>
