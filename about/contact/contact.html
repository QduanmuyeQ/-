<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>联系方式</title>
    <link rel="stylesheet" href="../../css/about.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow-x: hidden;
            overflow-y: auto;
            width: 100%;
        }
        body.animating {
            overflow-y: hidden;
        }
        .contact-content { 
            width: 100%;
            padding: 30px 0;
            color: white;
        }
        .contact-content h1 { 
            text-align: center; 
            margin-bottom: 25px; 
            color: #88DCDC; 
            font-size: 26px; 
        }
        .contact-card { 
            width: 90%;
            max-width: 520px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08); 
            padding: 35px; 
            border-radius: 20px; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar-wrap { 
            width: 110px; 
            height: 110px;
            margin: 0 auto 20px auto; 
            border-radius: 50%;
            border: 3px solid rgba(136, 220, 220, 0.3);
            box-shadow: 0 0 20px rgba(136, 220, 220, 0.2);
            position: relative;
            overflow: hidden;
        }
        .avatar-wrap img { 
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            object-position: center center;
            transform: translate(-50%, -50%);
            border-radius: 0;
            margin-top: 0;
            margin-left: 0;
        }
        .contact-card h2 { 
            color: #FFB6C1; 
            margin-bottom: 25px; 
            font-size: 22px; 
            text-align: center;
        }
        .info-list { 
            max-width: 350px;
            margin: 0 auto;
        }
        .info-item { 
            margin-bottom: 14px; 
            font-size: 15px; 
            line-height: 1.5;
            overflow: hidden;
        }
        .info-item .label { 
            float: left;
            color: #88DCDC; 
            font-weight: bold; 
            width: 70px; 
            text-align: right; 
            margin-right: 18px; 
            line-height: 1.5;
        }
        .info-item .value { 
            float: left;
            color: #ddd; 
            line-height: 1.5;
        }
        .divider { 
            height: 1px; 
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); 
            margin: 28px auto; 
            max-width: 350px;
        }
        .social-section { 
            text-align: center;
        }
        .social-section h3 { 
            margin-bottom: 20px; 
            color: #FFB6C1; 
            font-size: 16px; 
        }
        .social-links { 
            display: inline-block;
        }
        .social-card { 
            float: left;
            width: 100px;
            height: 95px;
            margin: 0 8px;
            background: rgba(255,255,255,0.06); 
            border-radius: 14px; 
            text-decoration: none; 
            color: white; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.08); 
        }
        .social-card:hover { 
            background: rgba(255,255,255,0.12); 
            transform: translateY(-2px); 
            box-shadow: 0 6px 18px rgba(0,0,0,0.2); 
        }
        .social-icon {
            width: 32px;
            height: 32px;
            margin: 16px auto 8px auto;
            background-position: center center;
            background-size: contain;
            background-repeat: no-repeat;
        }
        .social-icon.bilibili {
            background-image: url('img/bilibili.png');
        }
        .social-icon.github {
            background-image: url('img/github.png');
        }
        .social-card .name { 
            font-size: 12px; 
            font-weight: bold; 
            text-align: center; 
            line-height: 1;
        }
        .contact-content h1 { overflow: hidden; display: inline-block; }
        .contact-content h1 .title-inner { display: inline-block; }
        .page-header { text-align: center; margin-bottom: 25px; }
        .contact-card { opacity: 0; transform: translateY(60px); }
        .info-item { opacity: 0; transform: translateX(-30px); }
        .social-card { opacity: 0; transform: translateY(30px); }
    </style>
</head>
<body>
    <div class="contact-content">
        <div class="page-header">
            <h1 class="page-title"><span class="title-inner">💌 联系方式</span></h1>
        </div>
        
        <div class="contact-card">
            <div class="avatar-wrap">
                <img src="img/TouXiang11.png" alt="头像">
            </div>
            <h2>张炫羽</h2>
            
            <div class="info-list">
                <div class="info-item">
                    <span class="label">邮箱</span>
                    <span class="value">207XXX1XX0@qq.com</span>
                </div>
                <div class="info-item">
                    <span class="label">QQ</span>
                    <span class="value">207XXX1XX0</span>
                </div>
                <div class="info-item">
                    <span class="label">手机</span>
                    <span class="value">13682XXXXXX</span>
                </div>
                <div class="info-item">
                    <span class="label">学校</span>
                    <span class="value">广东建设职业技术学院</span>
                </div>
                <div class="info-item">
                    <span class="label">地址</span>
                    <span class="value">广东省深圳市XX区</span>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="social-section">
                <h3>社交平台</h3>
                <div class="social-links">
                    <a href="#" target="_blank" class="social-card">
                        <div class="social-icon bilibili"></div>
                        <div class="name">哔哩哔哩</div>
                    </a>
                    <a href="#" target="_blank" class="social-card">
                        <div class="social-icon github"></div>
                        <div class="name">GitHub</div>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.body.classList.add('animating');
        
        window.addEventListener('load', function() {
            if (typeof gsap === 'undefined') {
                document.body.classList.remove('animating');
                return;
            }
            gsap.registerPlugin(ScrollTrigger);
            
            const titleInner = document.querySelector('.page-title .title-inner');
            const title = document.querySelector('.page-title');
            const card = document.querySelector('.contact-card');
            const infoItems = document.querySelectorAll('.info-item');
            const socialCards = document.querySelectorAll('.social-card');
            
            const tl = gsap.timeline({ 
                delay: 0.3,
                onComplete: function() {
                    document.body.classList.remove('animating');
                }
            });
            
            if (titleInner && title) {
                tl.from(titleInner, {
                    yPercent: 120,
                    duration: 1.2,
                    ease: 'power4.out'
                }, 0.2);
                
                tl.from(title, {
                    scaleY: 0.7,
                    duration: 1,
                    ease: 'power3.out'
                }, 0.1);
            }
            
            if (card) {
                tl.to(card, {
                    y: 0,
                    opacity: 1,
                    duration: 1,
                    ease: 'power3.out'
                }, 0.6);
            }
            
            if (infoItems.length) {
                tl.to(infoItems, {
                    x: 0,
                    opacity: 1,
                    duration: 0.7,
                    ease: 'power3.out',
                    stagger: 0.1
                }, 1);
            }
            
            if (socialCards.length) {
                tl.to(socialCards, {
                    y: 0,
                    opacity: 1,
                    duration: 0.7,
                    ease: 'power3.out',
                    stagger: 0.15
                }, 1.4);
            }
        });
    </script>
</body>
</html>
