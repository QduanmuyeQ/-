<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小游戏</title>
    <link rel="stylesheet" href="../../css/comment.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; }
        .games-page { padding: 30px; color: white; }
        .games-page h1 { text-align: center; margin-bottom: 30px; color: #88DCDC; font-size: 28px; overflow: hidden; display: inline-block; }
        .games-page h1 .title-inner { display: inline-block; }
        .page-header { text-align: center; margin-bottom: 30px; }
        .game-card { opacity: 0; transform: translateY(60px); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; }
        .game-card { position: relative; background: rgba(255,255,255,0.08); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.1); overflow: hidden; }
        .game-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.12); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .game-card .game-icon { font-size: 50px; margin-bottom: 15px; }
        .game-card h3 { margin-bottom: 8px; color: #FFB6C1; }
        .game-card p { font-size: 13px; color: #aaa; line-height: 1.5; }
        .game-card.active { grid-column: span 2; animation: cardExpand 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; box-shadow: 0 20px 60px rgba(0,0,0,0.4); z-index: 10; background: rgba(20, 20, 20, 0.95); padding: 15px 25px 25px; }
        @keyframes cardExpand { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.02); opacity: 0.9; } 100% { transform: scale(1); opacity: 1; } }
        .game-card.active .game-preview { display: none; }
        .game-card.active .game-content { display: block; }
        .game-card .game-content { display: none; text-align: left; padding-top: 10px; }
        .game-card .game-content h2 { color: #88DCDC; margin-bottom: 15px; margin-top: 10px; text-align: center; font-size: 22px; }
        .game-card .close-btn { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border: none; border-radius: 50%; background: rgba(255,255,255,0.15); color: white; font-size: 20px; cursor: pointer; transition: background 0.2s; z-index: 10; }
        .game-card .close-btn:hover { background: rgba(255,255,255,0.3); }
        .danmaku-container { position: relative; width: 100%; height: 350px; background: rgba(0,0,0,0.3); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        .danmaku-item { position: absolute; white-space: nowrap; font-size: 16px; color: white; text-shadow: 1px 1px 2px black; animation: danmakuMove linear forwards; }
        @keyframes danmakuMove { 0% { transform: translateX(0); } 100% { transform: translateX(-100vw); } }
        .danmaku-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .danmaku-input input { flex: 1; padding: 10px 15px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; outline: none; }
        .danmaku-input input::placeholder { color: #888; }
        .danmaku-input button { padding: 10px 20px; border: none; border-radius: 8px; background: linear-gradient(90deg, #88DCDC, #FFB6C1); color: white; cursor: pointer; font-weight: bold; }
        .color-picker { display: flex; gap: 8px; margin-bottom: 15px; align-items: center; }
        .color-picker span { font-size: 13px; color: #aaa; }
        .color-option { width: 25px; height: 25px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .color-option.active { border-color: white; transform: scale(1.2); }
        .gacha-machine { text-align: center; padding: 30px 0; }
        .gacha-display { width: 180px; height: 240px; margin: 0 auto 25px; perspective: 1000px; }
        .gacha-card { width: 100%; height: 100%; background: rgba(255,255,255,0.1); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 60px; position: relative; transition: transform 0.6s; transform-style: preserve-3d; }
        .gacha-card.flipping { animation: cardFlip 0.8s ease-out; }
        @keyframes cardFlip { 0% { transform: rotateY(0) scale(1); } 50% { transform: rotateY(180deg) scale(1.1); } 100% { transform: rotateY(360deg) scale(1); } }
        .gacha-card .rarity { position: absolute; top: 10px; right: 10px; font-size: 14px; font-weight: bold; padding: 3px 8px; border-radius: 10px; }
        .rarity-N { color: #aaa; background: rgba(170,170,170,0.2); }
        .rarity-R { color: #4A90D9; background: rgba(74,144,217,0.2); }
        .rarity-SR { color: #A855F7; background: rgba(168,85,247,0.2); }
        .rarity-SSR { color: #FFA500; background: rgba(255,165,0,0.2); }
        .gacha-card .char-name { font-size: 18px; margin-top: 10px; font-weight: bold; }
        .gacha-buttons { display: flex; gap: 15px; justify-content: center; }
        .gacha-btn { padding: 12px 30px; border: none; border-radius: 25px; background: linear-gradient(90deg, #88DCDC, #FFB6C1); color: white; cursor: pointer; font-size: 16px; font-weight: bold; transition: transform 0.2s; }
        .gacha-btn:hover { transform: scale(1.05); }
        .gacha-btn.ten-pull { background: linear-gradient(90deg, #FFA500, #FF6B6B); }
        .gacha-stats { margin-top: 20px; font-size: 13px; color: #aaa; }
        .gacha-stats span { margin: 0 10px; }
        .guess-game { text-align: center; padding: 20px 0; }
        .guess-score { font-size: 18px; margin-bottom: 20px; color: #FFA500; }
        .guess-options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .guess-option { padding: 15px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 15px; }
        .guess-option:hover { background: rgba(255,255,255,0.2); border-color: #88DCDC; }
        .guess-option.correct { background: rgba(76, 175, 80, 0.3); border-color: #4CAF50; }
        .guess-option.wrong { background: rgba(244, 67, 54, 0.3); border-color: #F44336; }
        .guess-option:disabled { cursor: not-allowed; }
        .guess-next { margin-top: 20px; padding: 12px 30px; border: none; border-radius: 25px; background: linear-gradient(90deg, #88DCDC, #FFB6C1); color: white; cursor: pointer; font-size: 15px; font-weight: bold; }
        .fortune-result { text-align: center; padding: 20px 0; }
        .fortune-level { font-size: 48px; margin-bottom: 15px; }
        .fortune-title { font-size: 28px; font-weight: bold; margin-bottom: 20px; color: #FFB6C1; }
        .fortune-details { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 25px; }
        .fortune-item { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 10px; text-align: center; }
        .fortune-item .label { font-size: 13px; color: #aaa; margin-bottom: 5px; }
        .fortune-item .value { font-size: 18px; font-weight: bold; color: #88DCDC; }
        .fortune-lucky { grid-column: span 2; }
        .fortune-tips { margin-top: 25px; padding: 15px; background: rgba(255,165,0,0.1); border-radius: 10px; font-size: 14px; line-height: 1.6; }
        .fortune-refresh { margin-top: 20px; padding: 10px 25px; border: none; border-radius: 20px; background: rgba(255,255,255,0.1); color: #aaa; cursor: pointer; font-size: 13px; }
        .fortune-refresh:hover { background: rgba(255,255,255,0.2); }
        .memory-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .memory-card { aspect-ratio: 1; background: rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; transition: all 0.3s; border: 2px solid rgba(255,255,255,0.1); }
        .memory-card:hover { background: rgba(255,255,255,0.15); }
        .memory-card.flipped { background: rgba(136, 220, 220, 0.2); border-color: #88DCDC; transform: rotateY(180deg); }
        .memory-card.flipped .card-front { transform: rotateY(180deg) scaleX(-1); }
        .memory-card.matched { background: rgba(76, 175, 80, 0.2); border-color: #4CAF50; animation: matchPulse 0.5s; }
        .memory-card.matched .card-front { transform: rotateY(180deg) scaleX(-1); }
        @keyframes matchPulse { 0%, 100% { transform: scale(1) rotateY(180deg); } 50% { transform: scale(1.1) rotateY(180deg); } }
        .memory-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .memory-info span { font-size: 14px; color: #aaa; }
        .memory-info b { color: #FFB6C1; }
        .memory-restart { padding: 10px 25px; border: none; border-radius: 20px; background: linear-gradient(90deg, #88DCDC, #FFB6C1); color: white; cursor: pointer; font-weight: bold; }
        .memory-win { text-align: center; padding: 30px 0; display: none; }
        .memory-win.show { display: block; animation: winFade 0.5s ease; }
        @keyframes winFade { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        .memory-win h3 { color: #FFA500; font-size: 24px; margin-bottom: 15px; }
        .memory-win p { color: #ddd; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="games-page">
        <div class="page-header">
            <h1 class="page-title"><span class="title-inner">🎮 小游戏</span></h1>
        </div>
        
        <div class="games-grid">
            <div class="game-card" data-game="danmaku">
                <button class="close-btn">×</button>
                <div class="game-preview">
                    <div class="game-icon">💬</div>
                    <h3>弹幕留言墙</h3>
                    <p>发送你的弹幕，让文字在屏幕上飞舞~</p>
                </div>
                <div class="game-content">
                    <h2>💬 弹幕留言墙</h2>
                    <div class="danmaku-container" id="danmakuContainer"></div>
                    <div class="color-picker">
                        <span>颜色：</span>
                        <div class="color-option active" style="background: #ffffff;" data-color="#ffffff"></div>
                        <div class="color-option" style="background: #88DCDC;" data-color="#88DCDC"></div>
                        <div class="color-option" style="background: #FFB6C1;" data-color="#FFB6C1"></div>
                        <div class="color-option" style="background: #FFA500;" data-color="#FFA500"></div>
                        <div class="color-option" style="background: #A855F7;" data-color="#A855F7"></div>
                        <div class="color-option" style="background: #4CAF50;" data-color="#4CAF50"></div>
                    </div>
                    <div class="danmaku-input">
                        <input type="text" id="danmakuInput" placeholder="输入弹幕内容..." maxlength="50">
                        <button onclick="sendDanmaku()">发送</button>
                    </div>
                    <p style="font-size: 12px; color: #888; text-align: center;">💡 提示：弹幕会从右往左飘过~</p>
                </div>
            </div>
            
            <div class="game-card" data-game="gacha">
                <button class="close-btn">×</button>
                <div class="game-preview">
                    <div class="game-icon">🎴</div>
                    <h3>趣味抽卡</h3>
                    <p>VOCALOID角色抽卡，试试你的欧气！</p>
                </div>
                <div class="game-content">
                    <h2>🎴 趣味抽卡</h2>
                    <div class="gacha-machine">
                        <div class="gacha-display">
                            <div class="gacha-card" id="gachaCard">
                                <span style="font-size: 80px;">❓</span>
                            </div>
                        </div>
                        <div class="gacha-buttons">
                            <button class="gacha-btn" onclick="singlePull()">单抽</button>
                            <button class="gacha-btn ten-pull" onclick="tenPull()">十连</button>
                        </div>
                        <div class="gacha-stats">
                            <span>总抽数：<b id="totalPulls">0</b></span>
                            <span>SSR：<b id="ssrCount">0</b></span>
                            <span>SR：<b id="srCount">0</b></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="game-card" data-game="memory">
                <button class="close-btn">×</button>
                <div class="game-preview">
                    <div class="game-icon">🃏</div>
                    <h3>记忆翻牌</h3>
                    <p>找出相同的角色卡片，考验你的记忆力！</p>
                </div>
                <div class="game-content">
                    <h2>🃏 记忆翻牌</h2>
                    <div class="memory-info">
                        <span>步数：<b id="memoryMoves">0</b></span>
                        <span>已配对：<b id="memoryPairs">0</b>/8</span>
                        <button class="memory-restart" onclick="initMemoryGame()">重新开始</button>
                    </div>
                    <div class="memory-win" id="memoryWin">
                        <h3>🎉 恭喜通关！</h3>
                        <p>你用了 <b id="memoryFinalMoves">0</b> 步完成了游戏</p>
                        <button class="memory-restart" onclick="initMemoryGame()">再玩一次</button>
                    </div>
                    <div class="memory-board" id="memoryBoard"></div>
                </div>
            </div>
            
            <div class="game-card" data-game="fortune">
                <button class="close-btn">×</button>
                <div class="game-preview">
                    <div class="game-icon">🔮</div>
                    <h3>今日运势</h3>
                    <p>看看今天的运气如何吧~</p>
                </div>
                <div class="game-content">
                    <h2>🔮 今日运势</h2>
                    <div class="fortune-result" id="fortuneResult">
                        <div class="fortune-level">✨</div>
                        <div class="fortune-title">点击下方按钮抽取今日运势</div>
                        <button class="guess-play-btn" onclick="drawFortune()">抽取运势</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const gachaCharacters = [
            { name: '初音未来', icon: '🎤', rarity: 'SSR' },
            { name: '镜音铃', icon: '🎵', rarity: 'SSR' },
            { name: '镜音连', icon: '🎶', rarity: 'SSR' },
            { name: '重音Teto', icon: '🎀', rarity: 'SR' },
            { name: '歌爱雪', icon: '❄️', rarity: 'SR' },
            { name: '巡音流歌', icon: '🌸', rarity: 'SR' },
            { name: 'GUMI', icon: '🍊', rarity: 'SR' },
            { name: 'KAITO', icon: '🧣', rarity: 'R' },
            { name: 'MEIKO', icon: '🎤', rarity: 'R' },
            { name: '洛天依', icon: '💚', rarity: 'SSR' },
            { name: '言和', icon: '💙', rarity: 'SR' },
            { name: '乐正绫', icon: '❤️', rarity: 'SR' },
            { name: '星尘', icon: '⭐', rarity: 'R' },
            { name: '心华', icon: '💜', rarity: 'R' },
            { name: '嫣汐', icon: '🌸', rarity: 'N' },
            { name: '章楚楚', icon: '📚', rarity: 'N' },
        ];
        const rarityWeights = { 'N': 50, 'R': 30, 'SR': 15, 'SSR': 5 };
        let totalPulls = 0, ssrCount = 0, srCount = 0;
        
        const memoryChars = ['🎤', '🎵', '🎶', '🎀', '❄️', '🌸', '🍊', '⭐'];
        let memoryCards = [];
        let flippedCards = [];
        let memoryMoves = 0;
        let memoryPairs = 0;
        let memoryLocked = false;
        let danmakuColor = '#ffffff';
        
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('click', function(e) {
                if (e.target.closest('.close-btn')) { e.stopPropagation(); closeGame(); return; }
                if (!card.classList.contains('active')) { openGame(card); }
            });
            card.querySelector('.close-btn').addEventListener('click', function(e) { e.stopPropagation(); closeGame(); });
        });
        
        function openGame(card) {
            document.querySelectorAll('.game-card.active').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
        }
        function closeGame() {
            document.querySelectorAll('.game-card.active').forEach(c => c.classList.remove('active'));
        }
        
        document.querySelectorAll('.color-option').forEach(opt => {
            opt.addEventListener('click', function(e) {
                e.stopPropagation();
                document.querySelectorAll('.color-option').forEach(o => o.classList.remove('active'));
                this.classList.add('active');
                danmakuColor = this.dataset.color;
            });
        });
        
        function sendDanmaku() {
            const input = document.getElementById('danmakuInput');
            const text = input.value.trim();
            if (!text) return;
            saveDanmaku(text, danmakuColor);
            createDanmaku(text, danmakuColor);
            input.value = '';
        }
        document.getElementById('danmakuInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendDanmaku();
        });
        
        function saveDanmaku(text, color) {
            let list = JSON.parse(localStorage.getItem('danmakuList') || '[]');
            list.push({ text, color, time: Date.now() });
            if (list.length > 50) list = list.slice(-50);
            localStorage.setItem('danmakuList', JSON.stringify(list));
        }
        function loadDanmaku() {
            const list = JSON.parse(localStorage.getItem('danmakuList') || '[]');
            list.forEach((item, index) => {
                setTimeout(() => createDanmaku(item.text, item.color), index * 800);
            });
        }
        loadDanmaku();
        
        function createDanmaku(text, color) {
            const container = document.getElementById('danmakuContainer');
            const item = document.createElement('div');
            item.className = 'danmaku-item';
            item.textContent = text;
            item.style.color = color || '#ffffff';
            item.style.top = Math.random() * (container.offsetHeight - 30) + 'px';
            item.style.right = '-200px';
            item.style.animationDuration = (8 + Math.random() * 6) + 's';
            container.appendChild(item);
            setTimeout(() => item.remove(), 14000);
        }
        
        function singlePull() {
            const char = getRandomChar();
            totalPulls++;
            if (char.rarity === 'SSR') ssrCount++;
            if (char.rarity === 'SR') srCount++;
            updateGachaStats();
            showGachaCard(char);
        }
        function tenPull() {
            let results = [];
            let hasSRorUp = false;
            for (let i = 0; i < 10; i++) {
                let char;
                if (i === 9 && !hasSRorUp) {
                    const srChars = gachaCharacters.filter(c => c.rarity === 'SR' || c.rarity === 'SSR');
                    char = srChars[Math.floor(Math.random() * srChars.length)];
                } else {
                    char = getRandomChar();
                }
                if (char.rarity === 'SR' || char.rarity === 'SSR') hasSRorUp = true;
                results.push(char);
                totalPulls++;
                if (char.rarity === 'SSR') ssrCount++;
                if (char.rarity === 'SR') srCount++;
            }
            updateGachaStats();
            const best = results.reduce((a, b) => {
                const order = { 'SSR': 4, 'SR': 3, 'R': 2, 'N': 1 };
                return order[a.rarity] > order[b.rarity] ? a : b;
            });
            showGachaCard(best, results.length + '连抽！');
        }
        function getRandomChar() {
            const total = Object.values(rarityWeights).reduce((a, b) => a + b, 0);
            let rand = Math.random() * total;
            let rarity = 'N';
            for (const [r, w] of Object.entries(rarityWeights)) {
                rand -= w;
                if (rand <= 0) { rarity = r; break; }
            }
            const chars = gachaCharacters.filter(c => c.rarity === rarity);
            return chars[Math.floor(Math.random() * chars.length)];
        }
        function showGachaCard(char, extraText) {
            const card = document.getElementById('gachaCard');
            card.classList.remove('flipping');
            void card.offsetWidth;
            card.classList.add('flipping');
            setTimeout(() => {
                card.innerHTML = `
                    <span class="rarity rarity-${char.rarity}">${char.rarity}</span>
                    <span style="font-size: 80px;">${char.icon}</span>
                    <div class="char-name" style="color: ${char.rarity === 'SSR' ? '#FFA500' : char.rarity === 'SR' ? '#A855F7' : char.rarity === 'R' ? '#4A90D9' : '#aaa'};">${char.name}</div>
                    ${extraText ? `<div style="font-size: 12px; color: #888; margin-top: 8px;">${extraText}</div>` : ''}
                `;
            }, 300);
        }
        function updateGachaStats() {
            document.getElementById('totalPulls').textContent = totalPulls;
            document.getElementById('ssrCount').textContent = ssrCount;
            document.getElementById('srCount').textContent = srCount;
        }
        
        function initMemoryGame() {
            memoryMoves = 0;
            memoryPairs = 0;
            flippedCards = [];
            memoryLocked = false;
            document.getElementById('memoryMoves').textContent = '0';
            document.getElementById('memoryPairs').textContent = '0';
            document.getElementById('memoryWin').classList.remove('show');
            
            memoryCards = [...memoryChars, ...memoryChars];
            memoryCards.sort(() => Math.random() - 0.5);
            
            const board = document.getElementById('memoryBoard');
            board.innerHTML = '';
            memoryCards.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = index;
                card.dataset.char = char;
                card.innerHTML = '<span class="card-front">❓</span>';
                card.addEventListener('click', () => flipMemoryCard(card, index));
                board.appendChild(card);
            });
        }
        function flipMemoryCard(card, index) {
            if (memoryLocked) return;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            card.querySelector('.card-front').textContent = card.dataset.char;
            flippedCards.push({ card, index, char: card.dataset.char });
            
            if (flippedCards.length === 2) {
                memoryMoves++;
                document.getElementById('memoryMoves').textContent = memoryMoves;
                checkMemoryMatch();
            }
        }
        function checkMemoryMatch() {
            const [first, second] = flippedCards;
            if (first.char === second.char) {
                first.card.classList.add('matched');
                second.card.classList.add('matched');
                memoryPairs++;
                document.getElementById('memoryPairs').textContent = memoryPairs;
                flippedCards = [];
                
                if (memoryPairs === memoryChars.length) {
                    setTimeout(() => {
                        document.getElementById('memoryFinalMoves').textContent = memoryMoves;
                        document.getElementById('memoryWin').classList.add('show');
                    }, 500);
                }
            } else {
                memoryLocked = true;
                setTimeout(() => {
                    first.card.classList.remove('flipped');
                    second.card.classList.remove('flipped');
                    first.card.querySelector('.card-front').textContent = '❓';
                    second.card.querySelector('.card-front').textContent = '❓';
                    flippedCards = [];
                    memoryLocked = false;
                }, 1000);
            }
        }
        
        function drawFortune() {
            const today = new Date().toDateString();
            const stored = localStorage.getItem('fortune_' + today);
            let fortune;
            if (stored) {
                fortune = JSON.parse(stored);
            } else {
                const levels = [
                    { level: '大吉', icon: '🌟', chance: 10 },
                    { level: '中吉', icon: '✨', chance: 20 },
                    { level: '小吉', icon: '⭐', chance: 30 },
                    { level: '吉', icon: '🍀', chance: 25 },
                    { level: '平', icon: '☀️', chance: 10 },
                    { level: '凶', icon: '🌧️', chance: 5 },
                ];
                const total = levels.reduce((s, l) => s + l.chance, 0);
                let rand = Math.random() * total;
                let selected = levels[levels.length - 1];
                for (const l of levels) {
                    rand -= l.chance;
                    if (rand <= 0) { selected = l; break; }
                }
                const luckyColors = ['苍绿色', '粉色', '橙色', '紫色', '蓝色', '黄色', '红色'];
                const luckyNums = [Math.floor(Math.random() * 99) + 1];
                const luckyThings = ['听音乐', '追番', '打游戏', '散步', '吃好吃的', '睡觉', '看书', '和朋友聊天'];
                const tips = [
                    '今天适合放松心情，听听喜欢的歌吧~',
                    '记得多喝水，保持好状态！',
                    '遇到烦心事也不要气馁，好运在后头呢~',
                    '今天的你特别棒，继续加油！',
                    '适当休息也很重要，别太累了哦~',
                    '微笑是最好的护身符，今天也要开开心心！',
                    '相信自己，你比想象中更强大！',
                ];
                fortune = {
                    level: selected.level,
                    icon: selected.icon,
                    luckyColor: luckyColors[Math.floor(Math.random() * luckyColors.length)],
                    luckyNum: Math.floor(Math.random() * 99) + 1,
                    luckyThing: luckyThings[Math.floor(Math.random() * luckyThings.length)],
                    tip: tips[Math.floor(Math.random() * tips.length)],
                };
                localStorage.setItem('fortune_' + today, JSON.stringify(fortune));
            }
            showFortune(fortune);
        }
        function showFortune(f) {
            const result = document.getElementById('fortuneResult');
            result.innerHTML = `
                <div class="fortune-level">${f.icon}</div>
                <div class="fortune-title">${f.level}</div>
                <div class="fortune-details">
                    <div class="fortune-item">
                        <div class="label">幸运色</div>
                        <div class="value">${f.luckyColor}</div>
                    </div>
                    <div class="fortune-item">
                        <div class="label">幸运数字</div>
                        <div class="value">${f.luckyNum}</div>
                    </div>
                    <div class="fortune-item fortune-lucky">
                        <div class="label">今日宜</div>
                        <div class="value">${f.luckyThing}</div>
                    </div>
                </div>
                <div class="fortune-tips">💡 ${f.tip}</div>
                <button class="fortune-refresh" onclick="alert('每天只能抽一次哦~明天再来吧！')">每天限一次</button>
            `;
        }
        
        function initGamesAnimations() {
            if (typeof gsap === 'undefined') return;
            gsap.registerPlugin(ScrollTrigger);
            
            const titleInner = document.querySelector('.page-title .title-inner');
            const title = document.querySelector('.page-title');
            const cards = document.querySelectorAll('.games-grid .game-card');
            
            const tl = gsap.timeline({ delay: 0.3 });
            
            if (titleInner && title) {
                tl.from(titleInner, {
                    yPercent: 120,
                    duration: 1.2,
                    ease: 'power4.out'
                }, 0.2);
                
                tl.from(title, {
                    scaleY: 0.7,
                    duration: 1,
                    ease: 'power3.out'
                }, 0.1);
            }
            
            if (cards.length) {
                tl.to(cards, {
                    y: 0,
                    opacity: 1,
                    duration: 0.8,
                    ease: 'power3.out',
                    stagger: 0.12
                }, 0.5);
            }
        }
        
        window.addEventListener('load', initGamesAnimations);
    </script>
</body>
</html>
