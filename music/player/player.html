<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.0/jsmediatags.min.js"></script>
    <script src="songs.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: transparent;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 10px;
            margin: 0;
        }

        .player-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .player-main {
            display: flex;
            gap: 30px;
            flex: 1;
            min-height: 400px;
        }

        .player-left {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
        }

        .player-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 220px;
            max-height: 500px;
        }

        .album-cover {
            width: 220px;
            height: 220px;
            margin-bottom: 20px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .album-cover .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .album-cover:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay .play-icon {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: rgba(136, 220, 220, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .play-overlay .play-icon:hover {
            transform: scale(1.1);
        }

        .play-overlay .play-icon span {
            font-size: 30px;
            margin-left: 5px;
        }

        .song-info {
            text-align: center;
            margin-bottom: 15px;
        }

        .song-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #88DCDC, #FFB6C1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .song-artist {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 15px;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #88DCDC, #FFB6C1);
            border-radius: 3px;
            transition: width 0.1s linear;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: -5px;
            top: 50%;
            transform: translateY(-50%);
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(136, 220, 220, 0.5);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .time-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
        }

        .time-separator {
            color: rgba(136, 220, 220, 0.5);
            font-size: 14px;
            font-weight: bold;
        }

        #currentTime {
            color: #88DCDC;
            font-weight: 600;
            font-size: 16px;
            min-width: 50px;
            text-align: right;
        }

        #totalTime {
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            min-width: 50px;
            text-align: left;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            position: relative;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .play-btn {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #88DCDC, #FFB6C1);
            font-size: 28px;
            box-shadow: 0 4px 15px rgba(136, 220, 220, 0.4);
            position: relative;
        }

        .play-icon-img {
            width: 28px;
            height: 28px;
            object-fit: contain;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .control-icon-img {
            width: 20px;
            height: 20px;
            object-fit: contain;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        .play-btn:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 30px rgba(136, 220, 220, 0.6);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-bottom: 15px;
        }

        .volume-icon {
            font-size: 16px;
            cursor: pointer;
        }

        .volume-slider {
            width: 100px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: linear-gradient(90deg, #88DCDC, #FFB6C1);
            border-radius: 2px;
        }

        .import-btn {
            text-align: center;
            padding: 8px 18px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(136, 220, 220, 0.3), rgba(255, 182, 193, 0.3));
            color: #88DCDC;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
            border: 1px dashed rgba(136, 220, 220, 0.5);
        }

        .import-btn:hover {
            background: linear-gradient(135deg, rgba(136, 220, 220, 0.5), rgba(255, 182, 193, 0.5));
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(136, 220, 220, 0.3);
        }

        .import-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .import-modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .import-modal {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .import-modal-overlay.show .import-modal {
            transform: scale(1);
        }

        .import-modal h3 {
            font-size: 24px;
            margin-bottom: 30px;
            text-align: center;
            background: linear-gradient(90deg, #88DCDC, #FFB6C1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .import-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .import-form label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 5px;
        }

        .import-form input[type="text"] {
            padding: 12px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .import-form input[type="text"]:focus {
            border-color: #88DCDC;
            box-shadow: 0 0 15px rgba(136, 220, 220, 0.3);
        }

        .import-form input[type="file"] {
            display: none;
        }

        .file-upload {
            padding: 20px;
            border-radius: 10px;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .file-upload:hover {
            border-color: #88DCDC;
            background: rgba(136, 220, 220, 0.1);
        }

        .file-upload.dragover {
            border-color: #88DCDC;
            background: rgba(136, 220, 220, 0.2);
            transform: scale(1.02);
        }

        .file-upload span {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .file-upload .upload-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: block;
        }

        .file-info {
            font-size: 12px;
            color: rgba(136, 220, 220, 0.8);
            margin-top: 5px;
        }

        .import-modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .import-modal-buttons button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-confirm {
            background: linear-gradient(135deg, #88DCDC, #FFB6C1);
            color: white;
            font-weight: bold;
        }

        .btn-confirm:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(136, 220, 220, 0.5);
        }

        .import-success {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .import-success .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            animation: success-pop 0.5s ease;
        }

        @keyframes success-pop {
            0% { transform: scale(0); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .import-success p {
            font-size: 18px;
            color: #88DCDC;
        }

        .playlist {
            max-height: 150px;
            overflow-y: auto;
            margin-top: auto;
        }

        .playlist-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.05);
            min-width: 100px;
            max-width: 120px;
            min-height: 90px;
            flex-shrink: 0;
            position: relative;
        }

        .playlist-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .playlist-item:hover .delete-btn {
            opacity: 1;
        }

        .playlist-item:hover .edit-btn {
            opacity: 1;
        }

        .playlist-item.active {
            background: rgba(136, 220, 220, 0.2);
            border: 1px solid rgba(136, 220, 220, 0.4);
        }

        .delete-btn {
            opacity: 0;
            position: absolute;
            top: -5px;
            right: -5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(255, 100, 100, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
            color: white;
        }

        .delete-btn:hover {
            background: rgba(255, 100, 100, 1);
            transform: scale(1.1);
        }

        .edit-btn {
            opacity: 0;
            position: absolute;
            top: -5px;
            left: -5px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(136, 220, 220, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 11px;
            color: white;
        }

        .edit-btn:hover {
            background: rgba(136, 220, 220, 1);
            transform: scale(1.1);
        }

        .playlist-item .item-number {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 5px;
        }

        .playlist-item.active .item-number {
            color: #88DCDC;
        }

        .playlist-item .item-info {
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        .playlist-item.active .item-number {
            color: #88DCDC;
        }

        .playlist-item .item-info {
            flex: 1;
        }

        .playlist-item .item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .playlist-item .item-artist {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .playlist-item .item-duration {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .lyrics-container {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            padding: 20px 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100%;
            height: 100%;
        }

        .playlist-container {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            max-height: 130px;
            min-height: 100px;
            overflow: hidden;
        }

        .playlist {
            display: flex;
            flex-wrap: nowrap;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 5px;
            scrollbar-width: thin;
            scrollbar-color: rgba(136, 220, 220, 0.3) transparent;
        }

        .playlist::-webkit-scrollbar {
            height: 4px;
        }

        .playlist::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: rgba(136, 220, 220, 0.3);
            border-radius: 2px;
        }

        .lyrics-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 0 10px;
        }

        .lyrics-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .lyrics-scroll::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
        }

        .lyrics-scroll::-webkit-scrollbar-thumb {
            background: rgba(136, 220, 220, 0.4);
            border-radius: 2px;
        }

        .lyrics-scroll::-webkit-scrollbar-thumb:hover {
            background: rgba(136, 220, 220, 0.6);
        }

        .lyric-line {
            text-align: center;
            padding: 8px 12px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            border-radius: 6px;
            cursor: pointer;
            line-height: 1.4;
        }

        .lyric-line:hover {
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.05);
        }

        .lyric-line.active {
            color: #88DCDC;
            font-size: 16px;
            font-weight: bold;
            background: rgba(136, 220, 220, 0.1);
            text-shadow: 0 0 15px rgba(136, 220, 220, 0.3);
            padding: 10px 15px;
        }

        .lyric-line.inactive-prev {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
        }

        .lyric-line.inactive-next {
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        @media (max-width: 800px) {
            .player-container {
                flex-direction: column;
                max-width: 500px;
            }

            .player-right {
                max-height: 400px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-main">
            <div class="player-left">
                <div class="album-cover" id="albumCover">
                    <img src="img/Happy_Synthesizer.png" id="coverImg">
                    <div class="play-overlay" onclick="togglePlay()">
                        <div class="play-icon"><span>▶</span></div>
                    </div>
                </div>

                <div class="song-info">
                    <div class="song-title" id="songTitle">幻听</div>
                    <div class="song-artist" id="songArtist">许嵩</div>
                </div>

                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="time-display">
                    <span id="currentTime">0:00</span>
                    <span class="time-separator">/</span>
                    <span id="totalTime">0:00</span>
                </div>

                <div class="controls">
                    <div class="control-btn" onclick="prevSong()">
                        <img src="img/left.png" alt="上一首" class="control-icon-img">
                    </div>
                    <div class="control-btn play-btn" onclick="togglePlay()" id="playBtn">
                        <img src="img/stop.png" alt="播放" id="controlPlayIcon" class="play-icon-img">
                    </div>
                    <div class="control-btn" onclick="nextSong()">
                        <img src="img/right.png" alt="下一首" class="control-icon-img">
                    </div>
                </div>

                <div class="volume-control">
                    <span class="volume-icon" onclick="toggleMute()" id="volumeIcon">🔊</span>
                    <div class="volume-slider" id="volumeSlider" onclick="setVolume(event)">
                        <div class="volume-fill" id="volumeFill" style="width: 70%"></div>
                    </div>
                </div>

                <div class="import-btn" onclick="showImportModal()">
                    ➕ 导入歌曲
                </div>
            </div>

            <div class="player-right">
                <div class="lyrics-container">
                    <div class="lyrics-scroll" id="lyricsScroll">
                        <div class="lyric-line">加载中...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="playlist-container" id="playlistContainer">
            <div class="playlist" id="playlist">
            </div>
        </div>
    </div>

    <div class="import-modal-overlay" id="importModal">
        <div class="import-modal">
            <h3>🎵 导入歌曲</h3>
            
            <div class="import-form" id="importForm">
                <div>
                    <label>歌曲名称</label>
                    <input type="text" id="importTitle" placeholder="请输入歌曲名称">
                </div>
                
                <div>
                    <label>歌手名称</label>
                    <input type="text" id="importArtist" placeholder="请输入歌手名称">
                </div>
                
                <div>
                    <label>音频文件</label>
                    <input type="file" id="audioFile" accept="audio/*">
                    <div class="file-upload" onclick="document.getElementById('audioFile').click()">
                        <span class="upload-icon">🎵</span>
                        <span>点击选择音频文件 (MP3, WAV, OGG)</span>
                        <div class="file-info" id="audioFileName"></div>
                    </div>
                </div>
                
                <div>
                    <label>封面图片</label>
                    <input type="file" id="coverFile" accept="image/*">
                    <div class="file-upload" onclick="document.getElementById('coverFile').click()">
                        <span class="upload-icon">🖼️</span>
                        <span>点击选择封面图片 (PNG, JPG, JPEG)</span>
                        <div class="file-info" id="coverFileName"></div>
                    </div>
                </div>
                
                <div>
                    <label>歌词文件 (可选)</label>
                    <input type="file" id="lyricsFile" accept=".lrc">
                    <div class="file-upload" onclick="document.getElementById('lyricsFile').click()">
                        <span class="upload-icon">📝</span>
                        <span>点击选择歌词文件 (.lrc)</span>
                        <div class="file-info" id="lyricsFileName"></div>
                    </div>
                </div>
            </div>
            
            <div class="import-success" id="importSuccess">
                <div class="success-icon">✅</div>
                <p>导入成功！</p>
            </div>
            
            <div class="import-modal-buttons">
                <button class="btn-cancel" onclick="closeImportModal()">取消</button>
                <button class="btn-confirm" onclick="importSong()">确认导入</button>
            </div>
        </div>
    </div>

    <div class="import-modal-overlay" id="deleteModal">
        <div class="import-modal">
            <h3>🗑️ 删除歌曲</h3>
            <div style="text-align: center; margin-top: 20px;">
                <div style="font-size: 48px; margin-bottom: 15px;">😢</div>
                <p style="font-size: 16px; color: rgba(255,255,255,0.8);">确定要删除这首歌曲吗？</p>
                <p id="deleteSongName" style="font-size: 14px; color: #88DCDC; margin-top: 10px;"></p>
            </div>
            
            <div class="import-modal-buttons">
                <button class="btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn-confirm" onclick="confirmDelete()" style="background: linear-gradient(135deg, #ff6464, #ff8787);">确认删除</button>
            </div>
        </div>
    </div>

    <div class="import-modal-overlay" id="editModal">
        <div class="import-modal">
            <h3>✎ 编辑歌曲</h3>
            
            <div class="import-form" id="editForm">
                <div>
                    <label>歌曲名称</label>
                    <input type="text" id="editTitle" placeholder="请输入歌曲名称">
                </div>
                
                <div>
                    <label>歌手名称</label>
                    <input type="text" id="editArtist" placeholder="请输入歌手名称">
                </div>
                
                <div>
                    <label>封面图片 (可选)</label>
                    <input type="file" id="editCoverFile" accept="image/*">
                    <div class="file-upload" onclick="document.getElementById('editCoverFile').click()">
                        <span class="upload-icon">🖼️</span>
                        <span>点击选择封面图片 (PNG, JPG, JPEG)</span>
                        <div class="file-info" id="editCoverFileName"></div>
                    </div>
                </div>
                
                <div>
                    <label>歌词文件 (可选)</label>
                    <input type="file" id="editLyricsFile" accept=".lrc">
                    <div class="file-upload" onclick="document.getElementById('editLyricsFile').click()">
                        <span class="upload-icon">📝</span>
                        <span>点击选择歌词文件 (.lrc)</span>
                        <div class="file-info" id="editLyricsFileName"></div>
                    </div>
                </div>
            </div>
            
            <div class="import-modal-buttons">
                <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                <button class="btn-confirm" onclick="saveEdit()">保存修改</button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer">
        <source src="audio/xusong_huanting.mp3" type="audio/mpeg">
    </audio>

    <script>
        let playlist = [];

        let currentIndex = 0;
        let isPlaying = false;
        let isMuted = false;
        let volume = 0.7;
        let playMode = 'order';
        let lyricsData = [];

        const audio = document.getElementById('audioPlayer');
        const coverImg = document.getElementById('coverImg');
        const albumCover = document.getElementById('albumCover');
        const songTitle = document.getElementById('songTitle');
        const songArtist = document.getElementById('songArtist');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const playBtn = document.getElementById('playBtn');
        const playlistEl = document.getElementById('playlist');
        const volumeIcon = document.getElementById('volumeIcon');
        const volumeFill = document.getElementById('volumeFill');
        const lyricsScroll = document.getElementById('lyricsScroll');

        const DB_NAME = 'MusicPlayerDB';
        const DB_VERSION = 2;
        const STORE_NAME = 'songs';
        const EDIT_STORE_NAME = 'songEdits';

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => resolve(request.result);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                    }
                    if (!db.objectStoreNames.contains(EDIT_STORE_NAME)) {
                        db.createObjectStore(EDIT_STORE_NAME, { keyPath: 'file' });
                    }
                };
            });
        }

        async function saveSongEdit(song) {
            try {
                const db = await openDB();
                return new Promise((resolve) => {
                    const transaction = db.transaction([EDIT_STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(EDIT_STORE_NAME);
                    const editData = {
                        file: song.file,
                        title: song.title,
                        artist: song.artist,
                        cover: song.cover,
                        lyrics: song.lyrics
                    };
                    const request = store.put(editData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => resolve();
                });
            } catch (error) {
                console.log('保存编辑信息失败:', error);
            }
        }

        async function loadSongEdits() {
            try {
                const db = await openDB();
                return new Promise((resolve) => {
                    const transaction = db.transaction([EDIT_STORE_NAME], 'readonly');
                    const store = transaction.objectStore(EDIT_STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => resolve([]);
                });
            } catch (error) {
                console.log('加载编辑信息失败:', error);
                return [];
            }
        }

        async function applySongEdits(songs) {
            const edits = await loadSongEdits();
            const editMap = {};
            edits.forEach(edit => {
                editMap[edit.file] = edit;
            });
            songs.forEach(song => {
                if (editMap[song.file]) {
                    const edit = editMap[song.file];
                    if (edit.title) song.title = edit.title;
                    if (edit.artist) song.artist = edit.artist;
                    if (edit.cover) song.cover = edit.cover;
                    if (edit.lyrics) song.lyrics = edit.lyrics;
                }
            });
            return songs;
        }

        async function saveSongToDB(song) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const transaction = db.transaction([STORE_NAME], 'readwrite');
                const store = transaction.objectStore(STORE_NAME);
                const request = store.add(song);
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        async function loadSongsFromDB() {
            try {
                const db = await openDB();
                return new Promise((resolve) => {
                    const transaction = db.transaction([STORE_NAME], 'readonly');
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => resolve([]);
                });
            } catch {
                return [];
            }
        }

        async function loadSongsFromConfig() {
            try {
                const configSongs = JSON.parse(JSON.stringify(songsConfig));
                
                configSongs.forEach(song => {
                    if (song.cover && song.cover !== 'img/Happy_Synthesizer.png') {
                        song.customCover = true;
                    }
                    if (song.title) {
                        song.customTitle = true;
                    }
                    if (song.artist) {
                        song.customArtist = true;
                    }
                    if (song.lyrics && song.lyrics !== '') {
                        song.customLyrics = true;
                    }
                });
                
                const scannedSongs = await scanAudioFolder(configSongs);
                
                playlist = [...configSongs, ...scannedSongs];
                
                const seen = new Set();
                playlist = playlist.filter(song => {
                    if (seen.has(song.file)) return false;
                    seen.add(song.file);
                    return true;
                });
                
                await applySongEdits(playlist);
                
                await loadTagsFromAudioFiles();
                
                initPlaylist();
                loadLyrics(playlist[0]?.lyrics || '');
                coverImg.src = playlist[0]?.cover || 'img/Happy_Synthesizer.png';
                songTitle.textContent = playlist[0]?.title || '';
                songArtist.textContent = playlist[0]?.artist || '';
            } catch (error) {
                console.error('加载歌曲配置失败:', error);
                const scannedSongs = await scanAudioFolder([]);
                
                playlist = scannedSongs.length > 0 ? scannedSongs : [
                    { title: "幻听", artist: "许嵩", file: "audio/xusong_huanting.mp3", cover: "img/ht.jpg", duration: "0:00", lyrics: "" },
                    { title: "素颜", artist: "许嵩, 何曼婷", file: "audio/xusong_hemanting_suyan.mp3", cover: "img/sy.jpg", duration: "0:00", lyrics: "" }
                ];
                
                await applySongEdits(playlist);
                
                initPlaylist();
                loadLyrics(playlist[0]?.lyrics || '');
                coverImg.src = playlist[0]?.cover || 'img/Happy_Synthesizer.png';
                songTitle.textContent = playlist[0]?.title || '';
                songArtist.textContent = playlist[0]?.artist || '';
            }
        }

        async function scanAudioFolder(existingSongs) {
            const songs = [];
            const existingFiles = new Set(existingSongs.map(s => s.file));
            
            const audioFiles = [];
            
            const configTitles = {};

            for (const fileName of audioFiles) {
                const filePath = 'audio/' + fileName;
                
                if (existingFiles.has(filePath)) continue;
                
                try {
                    const response = await fetch(filePath);
                    if (!response.ok) continue;
                    
                    const blob = await response.blob();
                    
                    let title = '';
                    let artist = '';
                    let cover = 'img/Happy_Synthesizer.png';
                    let lyrics = '';
                    
                    if (configTitles[fileName]) {
                        title = configTitles[fileName].title;
                        artist = configTitles[fileName].artist;
                    } else {
                        const parsed = parseFileName(fileName);
                        title = parsed.title;
                        artist = parsed.artist;
                    }
                    
                    const coverName = fileName.replace('.mp3', '.png').replace('.MP3', '.PNG');
                    const coverPath = 'img/' + coverName;
                    let hasCustomCover = false;
                    try {
                        const coverResponse = await fetch(coverPath);
                        if (coverResponse.ok) {
                            cover = coverPath;
                            hasCustomCover = true;
                        }
                    } catch (e) {}
                    
                    const lyricsName = fileName.replace('.mp3', '.lrc').replace('.MP3', '.LRC');
                    const lyricsPath = 'lyrics/' + lyricsName;
                    let hasCustomLyrics = false;
                    try {
                        const lyricsResponse = await fetch(lyricsPath);
                        if (lyricsResponse.ok) {
                            lyrics = lyricsPath;
                            hasCustomLyrics = true;
                        }
                    } catch (e) {}
                    
                    const tag = await parseID3Tags(blob);
                    if (tag && tag.tags) {
                        if (tag.tags.title && !title) title = tag.tags.title;
                        if (tag.tags.artist && !artist) artist = tag.tags.artist;
                        if ((tag.tags.lyrics || tag.tags['USLT']) && !hasCustomLyrics && !lyrics) {
                            lyrics = tag.tags.lyrics || tag.tags['USLT'];
                        }
                    }
                    
                    const duration = await getAudioDuration(filePath);
                    
                    songs.push({
                        title: title,
                        artist: artist,
                        file: filePath,
                        cover: cover,
                        duration: duration,
                        lyrics: lyrics,
                        tagsLoaded: true
                    });
                } catch (error) {
                    console.log('无法加载音频文件:', fileName, error);
                }
            }
            
            return songs;
        }

        function parseFileName(fileName) {
            const name = fileName.replace(/\.(mp3|MP3)$/, '');
            
            const dashIndex = name.indexOf(' - ');
            if (dashIndex !== -1) {
                return {
                    artist: name.substring(0, dashIndex).trim(),
                    title: name.substring(dashIndex + 3).trim()
                };
            }
            
            const spaceIndex = name.lastIndexOf(' ');
            if (spaceIndex !== -1) {
                return {
                    artist: name.substring(0, spaceIndex).trim(),
                    title: name.substring(spaceIndex + 1).trim()
                };
            }
            
            return {
                artist: '',
                title: name
            };
        }

        async function loadTagsFromAudioFiles() {
            for (let i = 0; i < playlist.length; i++) {
                const song = playlist[i];
                if (song.tagsLoaded) continue;
                
                try {
                    const response = await fetch(song.file);
                    const blob = await response.blob();
                    
                    const tag = await parseID3Tags(blob);
                    if (tag && tag.tags) {
                        if (tag.tags.title && !song.title && !song.customTitle) {
                            song.title = tag.tags.title;
                        }
                        if (tag.tags.artist && !song.artist && !song.customArtist) {
                            song.artist = tag.tags.artist;
                        }
                        if ((tag.tags.lyrics || tag.tags['USLT']) && !song.lyrics && !song.customLyrics) {
                            song.lyrics = tag.tags.lyrics || tag.tags['USLT'];
                        }
                    }
                    
                    if (!song.duration || song.duration === '0:00') {
                        song.duration = await getAudioDuration(song.file);
                    }
                    
                    song.tagsLoaded = true;
                } catch (error) {
                    console.log('无法读取歌曲标签:', song.file, error);
                }
            }
            
            playlistEl.innerHTML = '';
            initPlaylist();
        }

        function getAudioDuration(url) {
            return new Promise((resolve) => {
                const tempAudio = new Audio(url);
                tempAudio.onloadedmetadata = function() {
                    const duration = tempAudio.duration;
                    if (!isNaN(duration) && duration > 0) {
                        const mins = Math.floor(duration / 60);
                        const secs = Math.floor(duration % 60);
                        resolve(`${mins}:${secs.toString().padStart(2, '0')}`);
                    } else {
                        resolve('0:00');
                    }
                    tempAudio.src = '';
                };
                tempAudio.onerror = function() {
                    resolve('0:00');
                };
                tempAudio.src = url;
            });
        }

        function initPlaylist() {
            playlistEl.innerHTML = '';
            playlist.forEach((song, index) => {
                const item = createPlaylistItem(song, index);
                playlistEl.appendChild(item);
            });
        }

        function createPlaylistItem(song, index) {
            const item = document.createElement('div');
            item.className = `playlist-item ${index === currentIndex ? 'active' : ''}`;
            item.onclick = (e) => {
                if (!e.target.closest('.delete-btn')) {
                    playSong(index);
                }
            };
            item.innerHTML = `
                <div class="item-number">${index + 1}</div>
                <div class="item-info">
                    <div class="item-title">${song.title}</div>
                    <div class="item-artist">${song.artist}</div>
                </div>
                <div class="edit-btn" onclick="event.stopPropagation(); editSong(${index})">✎</div>
                <div class="delete-btn" onclick="event.stopPropagation(); deleteSong(${index})">✕</div>
            `;
            return item;
        }

        function loadSong(index) {
            currentIndex = index;
            const song = playlist[index];
            
            audio.src = song.file;
            coverImg.src = song.cover;
            songTitle.textContent = song.title;
            songArtist.textContent = song.artist;
            
            totalTimeEl.textContent = '0:00';
            
            updateActiveItem();
            loadLyrics(song.lyrics);
            
            if (isPlaying) {
                audio.play();
            }
        }

        function playSong(index) {
            loadSong(index);
            play();
        }

        function play() {
            audio.play();
            isPlaying = true;
            document.getElementById('controlPlayIcon').src = 'img/start.png';
        }

        function pause() {
            audio.pause();
            isPlaying = false;
            document.getElementById('controlPlayIcon').src = 'img/stop.png';
        }

        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                play();
            }
        }

        function prevSong() {
            let newIndex;
            if (playMode === 'random') {
                newIndex = Math.floor(Math.random() * playlist.length);
            } else {
                newIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            }
            playSong(newIndex);
        }

        function nextSong() {
            let newIndex;
            if (playMode === 'random') {
                newIndex = Math.floor(Math.random() * playlist.length);
            } else if (playMode === 'loop' && !audio.ended) {
                audio.currentTime = 0;
                audio.play();
                return;
            } else {
                newIndex = (currentIndex + 1) % playlist.length;
            }
            playSong(newIndex);
        }

        function updateActiveItem() {
            const items = playlistEl.querySelectorAll('.playlist-item');
            items.forEach((item, index) => {
                if (index === currentIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function updateProgress() {
            const current = audio.currentTime;
            const total = audio.duration;
            
            if (total && !isNaN(total)) {
                const percent = (current / total) * 100;
                progressFill.style.width = percent + '%';
                currentTimeEl.textContent = formatTime(current);
                updateLyrics(current);
            }
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function seek(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            audio.currentTime = percent * audio.duration;
        }

        let isDraggingProgress = false;
        
        progressBar.addEventListener('mousedown', function(e) {
            isDraggingProgress = true;
            seek(e);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDraggingProgress) {
                const rect = progressBar.getBoundingClientRect();
                const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                audio.currentTime = percent * audio.duration;
            }
        });

        document.addEventListener('mouseup', function() {
            isDraggingProgress = false;
        });

        function setVolume(e) {
            const rect = document.getElementById('volumeSlider').getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            volume = Math.max(0, Math.min(1, percent));
            audio.volume = volume;
            volumeFill.style.width = (volume * 100) + '%';
            
            if (volume === 0) {
                volumeIcon.textContent = '🔇';
                isMuted = true;
            } else {
                volumeIcon.textContent = '🔊';
                isMuted = false;
            }
        }

        let isDraggingVolume = false;
        const volumeSlider = document.getElementById('volumeSlider');
        
        volumeSlider.addEventListener('mousedown', function(e) {
            isDraggingVolume = true;
            setVolume(e);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDraggingVolume) {
                const rect = volumeSlider.getBoundingClientRect();
                const percent = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                volume = percent;
                audio.volume = volume;
                volumeFill.style.width = (volume * 100) + '%';
                
                if (volume === 0) {
                    volumeIcon.textContent = '🔇';
                    isMuted = true;
                } else {
                    volumeIcon.textContent = '🔊';
                    isMuted = false;
                }
            }
        });

        document.addEventListener('mouseup', function() {
            isDraggingVolume = false;
        });

        function toggleMute() {
            if (isMuted) {
                audio.volume = volume;
                volumeFill.style.width = (volume * 100) + '%';
                volumeIcon.textContent = '🔊';
                isMuted = false;
            } else {
                audio.volume = 0;
                volumeFill.style.width = '0%';
                volumeIcon.textContent = '🔇';
                isMuted = true;
            }
        }

        function loadLyrics(lyricsSource) {
            lyricsScroll.innerHTML = '<div class="lyric-line">加载中...</div>';
            
            if (!lyricsSource) {
                lyricsData = [];
                lyricsScroll.innerHTML = '<div class="lyric-line">暂无歌词</div>';
                return;
            }
            
            if (lyricsSource.startsWith('http') || lyricsSource.startsWith('/') || lyricsSource.includes('.lrc')) {
                fetch(lyricsSource)
                    .then(response => response.text())
                    .then(text => {
                        lyricsData = parseLRC(text);
                        renderLyrics();
                    })
                    .catch(error => {
                        lyricsData = [];
                        lyricsScroll.innerHTML = '<div class="lyric-line">暂无歌词</div>';
                    });
            } else {
                lyricsData = parseLRC(lyricsSource);
                renderLyrics();
            }
        }

        function parseLRC(text) {
            const lines = text.split('\n');
            const lyrics = [];
            const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/g;
            const metaTags = ['ti', 'ar', 'al', 'by', 're', 've', 'offset', 'length', 'tool', 'author'];
            const metaPatterns = ['词：', '曲：', '编曲：', '专辑：', '演唱：', '作词：', '作曲：'];
            
            lines.forEach(line => {
                const trimmedLine = line.trim();
                if (!trimmedLine) return;
                
                const metaMatch = trimmedLine.match(/^\[([a-z]+):/i);
                if (metaMatch && metaTags.includes(metaMatch[1].toLowerCase())) {
                    return;
                }
                
                const isMetaLine = metaPatterns.some(pattern => trimmedLine.includes(pattern));
                if (isMetaLine) {
                    return;
                }
                
                const matches = [...trimmedLine.matchAll(timeRegex)];
                if (matches.length > 0) {
                    let lyricText = trimmedLine.replace(timeRegex, '').trim();
                    
                    if (lyricText && lyricText.length > 0) {
                        matches.forEach(match => {
                            const minutes = parseInt(match[1]);
                            const seconds = parseInt(match[2]);
                            const milliseconds = parseInt(match[3].padEnd(3, '0'));
                            const time = minutes * 60 + seconds + milliseconds / 1000;
                            
                            lyrics.push({ time, text: lyricText });
                        });
                    }
                }
            });
            
            return lyrics.sort((a, b) => a.time - b.time);
        }

        function renderLyrics() {
            if (lyricsData.length === 0) {
                lyricsScroll.innerHTML = '<div class="lyric-line">暂无歌词</div>';
                return;
            }
            
            lyricsScroll.innerHTML = '';
            lyricsData.forEach((lyric, index) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.textContent = lyric.text;
                div.onclick = () => {
                    audio.currentTime = lyric.time;
                };
                div.dataset.index = index;
                div.dataset.time = lyric.time;
                lyricsScroll.appendChild(div);
            });
        }

        function updateLyrics(currentTime) {
            if (lyricsData.length === 0) return;
            
            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }
            
            const lines = lyricsScroll.querySelectorAll('.lyric-line');
            
            lines.forEach((line, index) => {
                line.classList.remove('active', 'inactive-prev', 'inactive-next');
                line.style.display = 'block';
                
                if (index === activeIndex) {
                    line.classList.add('active');
                } else if (index < activeIndex) {
                    line.classList.add('inactive-prev');
                } else {
                    line.classList.add('inactive-next');
                }
            });
            
            if (activeIndex >= 0 && lines[activeIndex]) {
                const activeLine = lines[activeIndex];
                const containerHeight = lyricsScroll.clientHeight;
                const lineTop = activeLine.offsetTop;
                const lineHeight = activeLine.offsetHeight;
                
                const targetScrollTop = lineTop - containerHeight / 2 + lineHeight / 2;
                
                lyricsScroll.scrollTo({
                    top: Math.max(0, targetScrollTop),
                    behavior: 'smooth'
                });
            }
        }

        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextSong);
        audio.addEventListener('loadedmetadata', () => {
            totalTimeEl.textContent = formatTime(audio.duration);
        });

        audio.volume = volume;

        let importedAudioFile = null;
        let importedCoverFile = null;
        let importedLyricsFile = null;

        document.getElementById('coverFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                importedCoverFile = file;
                document.getElementById('coverFileName').textContent = '✓ ' + file.name;
            }
        });

        document.getElementById('lyricsFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                importedLyricsFile = file;
                document.getElementById('lyricsFileName').textContent = '✓ ' + file.name;
            }
        });

        function parseID3Tags(file) {
            return new Promise((resolve) => {
                if (typeof jsmediatags === 'undefined') {
                    console.log('jsmediatags库未加载，尝试手动解析');
                    parseID3Manually(file).then(resolve);
                    return;
                }
                
                jsmediatags.read(file, {
                    onSuccess: function(tag) {
                        console.log('ID3标签解析成功:', tag);
                        resolve(tag);
                    },
                    onError: function(error) {
                        console.log('jsmediatags解析失败，尝试手动解析:', error);
                        parseID3Manually(file).then(resolve);
                    }
                });
            });
        }

        async function parseID3Manually(file) {
            const arrayBuffer = await file.arrayBuffer();
            const buffer = new Uint8Array(arrayBuffer);
            const tags = {};
            
            const id3v2Header = buffer.slice(0, 10);
            if (String.fromCharCode(id3v2Header[0], id3v2Header[1], id3v2Header[2]) === 'ID3') {
                const version = id3v2Header[3];
                const revision = id3v2Header[4];
                const flags = id3v2Header[5];
                const size = (id3v2Header[6] & 0x7F) * 2097152 + 
                            (id3v2Header[7] & 0x7F) * 16384 + 
                            (id3v2Header[8] & 0x7F) * 128 + 
                            (id3v2Header[9] & 0x7F);
                
                console.log('ID3v2.' + version + '.' + revision + ', size: ' + size);
                
                let offset = 10;
                while (offset < size) {
                    const frameId = String.fromCharCode(buffer[offset], buffer[offset+1], buffer[offset+2], buffer[offset+3]);
                    if (frameId === '\x00\x00\x00\x00') break;
                    
                    const frameSize = buffer[offset+4] * 16777216 + 
                                     buffer[offset+5] * 65536 + 
                                     buffer[offset+6] * 256 + 
                                     buffer[offset+7];
                    
                    const frameData = buffer.slice(offset + 10, offset + 10 + frameSize);
                    
                    if (frameId === 'TIT2') {
                        tags.title = decodeFrameData(frameData);
                    } else if (frameId === 'TPE1') {
                        tags.artist = decodeFrameData(frameData);
                    } else if (frameId === 'APIC') {
                        const picData = parseAPIC(frameData);
                        if (picData) {
                            tags.picture = picData;
                        }
                    } else if (frameId === 'USLT') {
                        tags.lyrics = decodeFrameData(frameData);
                    }
                    
                    offset += 10 + frameSize;
                }
            } else {
                const id3v1Offset = buffer.length - 128;
                if (id3v1Offset >= 0 && String.fromCharCode(buffer[id3v1Offset], buffer[id3v1Offset+1], buffer[id3v1Offset+2]) === 'TAG') {
                    tags.title = decodeASCII(buffer, id3v1Offset + 3, 30);
                    tags.artist = decodeASCII(buffer, id3v1Offset + 33, 30);
                    console.log('找到ID3v1标签');
                }
            }
            
            console.log('手动解析结果:', tags);
            return { tags: tags };
        }

        function decodeFrameData(data) {
            if (data.length < 1) return '';
            const encoding = data[0];
            
            let text = '';
            if (encoding === 0) {
                text = decodeASCII(data, 1, data.length - 1);
            } else if (encoding === 1 || encoding === 2) {
                const textData = data.slice(1);
                const decoder = new TextDecoder('utf-16');
                text = decoder.decode(textData).replace(/\u0000/g, '');
            } else if (encoding === 3) {
                const textData = data.slice(1);
                const decoder = new TextDecoder('utf-8');
                text = decoder.decode(textData).replace(/\u0000/g, '');
            }
            
            return text.trim();
        }

        function decodeASCII(buffer, offset, length) {
            let text = '';
            for (let i = 0; i < length; i++) {
                const charCode = buffer[offset + i];
                if (charCode === 0) break;
                text += String.fromCharCode(charCode);
            }
            return text.trim();
        }

        function parseAPIC(data) {
            if (data.length < 5) return null;
            
            const encoding = data[0];
            let offset = 1;
            
            while (offset < data.length && data[offset] !== 0) offset++;
            offset++;
            
            const format = decodeASCII(data, offset, 30);
            while (offset < data.length && data[offset] !== 0) offset++;
            offset++;
            
            const pictureType = data[offset];
            offset++;
            
            while (offset < data.length && data[offset] !== 0) offset++;
            offset++;
            
            const pictureData = data.slice(offset);
            
            return {
                format: format.split('/').pop() || 'png',
                data: pictureData,
                type: pictureType
            };
        }

        document.getElementById('audioFile').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                importedAudioFile = file;
                document.getElementById('audioFileName').textContent = '✓ ' + file.name;
                
                const tag = await parseID3Tags(file);
                if (tag && tag.tags) {
                    console.log('解析到的标签:', tag.tags);
                    
                    if (tag.tags.title) {
                        console.log('标题:', tag.tags.title);
                        if (!document.getElementById('importTitle').value) {
                            document.getElementById('importTitle').value = tag.tags.title;
                        }
                    }
                    if (tag.tags.artist) {
                        console.log('艺术家:', tag.tags.artist);
                        if (!document.getElementById('importArtist').value) {
                            document.getElementById('importArtist').value = tag.tags.artist;
                        }
                    }
                    
                    if (tag.tags.picture) {
                        console.log('封面:', tag.tags.picture.format);
                        if (!importedCoverFile) {
                            const picture = tag.tags.picture;
                            const coverBlob = new Blob([picture.data], { type: 'image/' + picture.format });
                            importedCoverFile = coverBlob;
                            document.getElementById('coverFileName').textContent = '✓ 从音频提取封面';
                        }
                    }
                    
                    if (tag.tags.lyrics) {
                        console.log('歌词长度:', tag.tags.lyrics.length);
                        if (!importedLyricsFile) {
                            const lyricsBlob = new Blob([tag.tags.lyrics], { type: 'text/plain' });
                            importedLyricsFile = lyricsBlob;
                            document.getElementById('lyricsFileName').textContent = '✓ 从音频提取歌词';
                        }
                    }
                    
                    if (tag.tags['USLT']) {
                        console.log('USLT歌词:', tag.tags['USLT'].length);
                        if (!importedLyricsFile) {
                            const lyricsBlob = new Blob([tag.tags['USLT']], { type: 'text/plain' });
                            importedLyricsFile = lyricsBlob;
                            document.getElementById('lyricsFileName').textContent = '✓ 从音频提取歌词(USLT)';
                        }
                    }
                }
            }
        });

        function showImportModal() {
            document.getElementById('importModal').classList.add('show');
            document.getElementById('importForm').style.display = 'flex';
            document.getElementById('importSuccess').style.display = 'none';
            document.getElementById('importTitle').value = '';
            document.getElementById('importArtist').value = '';
            document.getElementById('audioFile').value = '';
            document.getElementById('coverFile').value = '';
            document.getElementById('lyricsFile').value = '';
            document.getElementById('audioFileName').textContent = '';
            document.getElementById('coverFileName').textContent = '';
            document.getElementById('lyricsFileName').textContent = '';
            importedAudioFile = null;
            importedCoverFile = null;
            importedLyricsFile = null;
        }

        function closeImportModal() {
            document.getElementById('importModal').classList.remove('show');
        }

        let editIndex = -1;
        let editCoverFile = null;
        let editLyricsFile = null;

        document.getElementById('editCoverFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                editCoverFile = file;
                document.getElementById('editCoverFileName').textContent = file.name;
            }
        });

        document.getElementById('editLyricsFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                editLyricsFile = file;
                document.getElementById('editLyricsFileName').textContent = file.name;
            }
        });

        function editSong(index) {
            editIndex = index;
            const song = playlist[index];
            
            document.getElementById('editTitle').value = song.title || '';
            document.getElementById('editArtist').value = song.artist || '';
            document.getElementById('editCoverFileName').textContent = '';
            document.getElementById('editLyricsFileName').textContent = '';
            editCoverFile = null;
            editLyricsFile = null;
            
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
            editIndex = -1;
            editCoverFile = null;
            editLyricsFile = null;
        }

        async function saveEdit() {
            if (editIndex < 0 || editIndex >= playlist.length) {
                closeEditModal();
                return;
            }

            const song = playlist[editIndex];
            const title = document.getElementById('editTitle').value.trim();
            const artist = document.getElementById('editArtist').value.trim();

            if (title) {
                song.title = title;
            }
            if (artist) {
                song.artist = artist;
            }

            if (editCoverFile) {
                const reader = new FileReader();
                const coverData = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsDataURL(editCoverFile);
                });
                song.cover = coverData;
            }

            if (editLyricsFile) {
                const reader = new FileReader();
                const lyricsText = await new Promise((resolve) => {
                    reader.onload = (e) => resolve(e.target.result);
                    reader.readAsText(editLyricsFile);
                });
                song.lyrics = lyricsText;
            }

            await saveSongEdit(song);

            if (editIndex === currentIndex) {
                coverImg.src = song.cover;
                songTitle.textContent = song.title;
                songArtist.textContent = song.artist;
                loadLyrics(song.lyrics);
            }

            playlistEl.innerHTML = '';
            initPlaylist();

            closeEditModal();
        }

        let deleteIndex = -1;

        async function deleteSong(index) {
            deleteIndex = index;
            const song = playlist[index];
            document.getElementById('deleteSongName').textContent = `"${song.title}" - ${song.artist}`;
            document.getElementById('deleteModal').classList.add('show');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.remove('show');
            deleteIndex = -1;
        }

        async function confirmDelete() {
            if (deleteIndex < 0 || deleteIndex >= playlist.length) {
                closeDeleteModal();
                return;
            }

            const song = playlist[deleteIndex];
            
            if (song.dbId) {
                try {
                    const db = await openDB();
                    await new Promise((resolve) => {
                        const transaction = db.transaction([STORE_NAME], 'readwrite');
                        const store = transaction.objectStore(STORE_NAME);
                        const request = store.delete(song.dbId);
                        request.onsuccess = () => resolve();
                        request.onerror = () => resolve();
                    });
                } catch (error) {
                    console.log('删除数据库记录失败:', error);
                }
            }

            try {
                const db = await openDB();
                await new Promise((resolve) => {
                    const transaction = db.transaction([EDIT_STORE_NAME], 'readwrite');
                    const store = transaction.objectStore(EDIT_STORE_NAME);
                    const request = store.delete(song.file);
                    request.onsuccess = () => resolve();
                    request.onerror = () => resolve();
                });
            } catch (error) {
                console.log('删除编辑信息失败:', error);
            }

            if (song.file.startsWith('blob:')) {
                URL.revokeObjectURL(song.file);
            }
            if (song.cover && song.cover.startsWith('blob:')) {
                URL.revokeObjectURL(song.cover);
            }
            if (song.lyrics && song.lyrics.startsWith('blob:')) {
                URL.revokeObjectURL(song.lyrics);
            }

            playlist.splice(deleteIndex, 1);

            playlistEl.innerHTML = '';
            initPlaylist();

            if (currentIndex >= playlist.length) {
                currentIndex = Math.max(0, playlist.length - 1);
            }

            if (playlist.length > 0) {
                loadSong(currentIndex);
                if (isPlaying) {
                    audio.play();
                }
            } else {
                songTitle.textContent = '暂无歌曲';
                songArtist.textContent = '';
                coverImg.src = '';
                audio.src = '';
                totalTimeEl.textContent = '0:00';
                currentTimeEl.textContent = '0:00';
                progressFill.style.width = '0%';
                isPlaying = false;
                document.getElementById('controlPlayIcon').src = 'img/start.png';
            }

            closeDeleteModal();
        }

        async function importSong() {
            const title = document.getElementById('importTitle').value.trim();
            const artist = document.getElementById('importArtist').value.trim();

            if (!title) {
                alert('请输入歌曲名称');
                return;
            }
            if (!artist) {
                alert('请输入歌手名称');
                return;
            }
            if (!importedAudioFile) {
                alert('请选择音频文件');
                return;
            }

            const audioBuffer = await importedAudioFile.arrayBuffer();
            
            let coverBuffer = null;
            let coverType = '';
            if (importedCoverFile) {
                coverBuffer = await importedCoverFile.arrayBuffer();
                coverType = importedCoverFile.type;
            }
            
            let lyricsText = '';
            if (importedLyricsFile) {
                lyricsText = await importedLyricsFile.text();
            }

            const audioUrl = URL.createObjectURL(importedAudioFile);
            const coverUrl = importedCoverFile ? URL.createObjectURL(importedCoverFile) : 'img/Happy_Synthesizer.png';

            const songToSave = {
                title: title,
                artist: artist,
                audioData: audioBuffer,
                audioType: importedAudioFile.type,
                coverData: coverBuffer,
                coverType: coverType,
                duration: '0:00',
                lyrics: lyricsText
            };

            await saveSongToDB(songToSave);

            completeImport(title, artist, audioUrl, coverUrl, lyricsText);
        }

        function completeImport(title, artist, audioUrl, coverUrl, lyricsText) {
            const newSong = {
                title: title,
                artist: artist,
                file: audioUrl,
                cover: coverUrl,
                duration: '0:00',
                lyrics: '',
                isImported: true
            };

            if (lyricsText) {
                newSong.lyrics = URL.createObjectURL(new Blob([lyricsText], { type: 'text/plain' }));
            }

            playlist.push(newSong);
            
            const item = document.createElement('div');
            item.className = 'playlist-item';
            item.onclick = () => playSong(playlist.length - 1);
            item.innerHTML = `
                <div class="playing-indicator"></div>
                <div class="item-number">${playlist.length}</div>
                <div class="item-info">
                    <div class="item-title">${title}</div>
                    <div class="item-artist">${artist}</div>
                </div>
                <div class="item-duration">0:00</div>
            `;
            playlistEl.appendChild(item);

            document.getElementById('importForm').style.display = 'none';
            document.getElementById('importSuccess').style.display = 'block';

            setTimeout(() => {
                closeImportModal();
            }, 1500);
        }

        loadSongsFromConfig();
    </script>
